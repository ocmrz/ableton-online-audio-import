<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Import Online Audio</title>
    <script>
      document.title = "Import Online Audio";

      function sendMessage(message) {
        if (
          window.webkit &&
          window.webkit.messageHandlers &&
          window.webkit.messageHandlers.live
        ) {
          window.webkit.messageHandlers.live.postMessage(message);
        } else if (window.chrome && window.chrome.webview) {
          window.chrome.webview.postMessage(message);
        }
      }
      function closeWithResult(result) {
        sendMessage({
          method: "close_and_send",
          params: [JSON.stringify(result)],
        });
      }

      var DEBOUNCE_MS = 320;
      var filters = {
        youtube: false,
        "youtube-music": false,
        soundcloud: false,
      };
      var selected = 0;
      var visible = [];
      var ranked = [];
      var debounceTimer = null;
      var searchGen = 0;
      var searching = false;
      var searchError = "";
      var previewGen = 0;
      var previewAbort = null;
      var previewItemKey = "";
      var previewDuration = 0;
      var previewStart = 0;
      var previewEnd = 0;
      var previewLoading = false;
      var previewReady = false;
      var previewError = "";
      var draggingTimeline = null;
      var dragFrame = null;
      var dragPendingTime = null;
      var dragTimelineRect = null;
      var dragPreviewTime = null;
      var dragInitialEnd = 0;
      var dragWasStoppedAtEnd = false;
      var previewProvider = "";
      var providerCurrentTime = 0;
      var providerPaused = true;
      var stoppedAtRangeEnd = false;
      var lastStoppedPreviewTime = 0;
      var youtubePlayer = null;
      var youtubePlayerReady = false;
      var youtubeReadyHandler = null;
      var youtubeStateHandler = null;
      var youtubeErrorHandler = null;
      var youtubePoll = null;
      var youtubeApiPromise = null;
      var youtubeRetryTimer = null;
      var youtubeLoadTimer = null;
      var soundcloudWidget = null;
      var soundcloudWidgetReady = false;
      var soundcloudApiPromise = null;
      var soundcloudRetryTimer = null;
      var soundcloudLoadTimer = null;
      var soundcloudTrackUrl = "";
      var MIN_SELECTION_S = 0.25;
      var AGE_RESTRICTED_WARNING = "age-restricted";
      var AGE_RESTRICTED_MESSAGE =
        "This audio is age-restricted. Please choose another result.";

      var LOGOS = {
        youtube: "__LOGO_YOUTUBE__",
        "youtube-music": "__LOGO_YOUTUBE_MUSIC__",
        soundcloud: "__LOGO_SOUNDCLOUD__",
      };

      function brandIcon(brand) {
        var src = LOGOS[brand] || LOGOS.youtube;
        return (
          '<img class="brand-icon" src="' +
          src +
          '" alt="" width="16" height="16" />'
        );
      }

      function fmtDuration(s) {
        if (s == null) return "?:??";
        var whole = Math.max(0, Math.round(s));
        var m = Math.floor(whole / 60);
        var r = whole % 60;
        return m + ":" + String(r).padStart(2, "0");
      }

      function fmtPrecise(s) {
        var parts = splitTime(s);
        return (
          parts.min +
          ":" +
          String(parts.sec).padStart(2, "0") +
          "." +
          String(Math.floor(parts.ms / 100))
        );
      }

      function splitTime(s) {
        var safe = Number.isFinite(s) ? Math.max(0, s) : 0;
        var totalMs = Math.round(safe * 1000);
        var ms = totalMs % 1000;
        var totalSec = (totalMs - ms) / 1000;
        var sec = totalSec % 60;
        var min = (totalSec - sec) / 60;
        return { min: min, sec: sec, ms: ms };
      }

      function joinTime(min, sec, ms) {
        return Math.max(0, (min || 0) * 60 + (sec || 0) + (ms || 0) / 1000);
      }

      function normalizeTimeParts(parts) {
        var min = parts.min | 0;
        var sec = parts.sec | 0;
        var ms = parts.ms | 0;
        while (ms >= 1000) {
          ms -= 1000;
          sec += 1;
        }
        while (ms < 0) {
          ms += 1000;
          sec -= 1;
        }
        while (sec >= 60) {
          sec -= 60;
          min += 1;
        }
        while (sec < 0) {
          sec += 60;
          min -= 1;
        }
        if (min < 0) {
          min = 0;
          sec = 0;
          ms = 0;
        }
        return { min: min, sec: sec, ms: ms };
      }

      function adjustTimeUnit(parts, unit, delta) {
        var next = {
          min: parts.min,
          sec: parts.sec,
          ms: parts.ms,
        };
        if (unit === "min") next.min += delta;
        else if (unit === "sec") next.sec += delta;
        else next.ms += delta;
        return normalizeTimeParts(next);
      }

      /**
       * Optical vertical nudge from Canvas TextMetrics (glyph “gravity” center).
       * Used when CSS text-box-trim is unavailable so digits sit truly centered.
       */
      function measureTimeInkNudgePx(fontSizePx, fontFamily) {
        try {
          if (
            typeof CSS !== "undefined" &&
            CSS.supports &&
            CSS.supports("text-box-trim", "trim-both")
          ) {
            return 0;
          }
        } catch (_) {}
        try {
          var canvas = document.createElement("canvas");
          var ctx = canvas.getContext("2d");
          if (!ctx) return 0;
          ctx.font = fontSizePx + "px " + fontFamily;
          var m = ctx.measureText("0123456789");
          var ascent = m.actualBoundingBoxAscent;
          var descent = m.actualBoundingBoxDescent;
          if (!Number.isFinite(ascent) || !Number.isFinite(descent)) return 0;
          var fontAscent = m.fontBoundingBoxAscent;
          var fontDescent = m.fontBoundingBoxDescent;
          if (!Number.isFinite(fontAscent) || !Number.isFinite(fontDescent)) {
            // Fall back: shift so ink center sits on the em midline approximation.
            return (descent - ascent) / 2;
          }
          var emCenter = (fontAscent - fontDescent) / 2;
          var inkCenter = (ascent - descent) / 2;
          return emCenter - inkCenter;
        } catch (_) {
          return 0;
        }
      }

      function applyTimeInkNudge(root) {
        if (!root) return;
        var sample =
          root.querySelector(".time-seg-value") ||
          root.querySelector(".clip-set-label") ||
          root.querySelector(".time-sep") ||
          root;
        var style = window.getComputedStyle(sample);
        var size = parseFloat(style.fontSize) || 10;
        var family = style.fontFamily || "AbletonSansSmall, sans-serif";
        var nudge = measureTimeInkNudgePx(size, family);
        root.style.setProperty(
          "--time-ink-nudge",
          (Number.isFinite(nudge) ? nudge : 0).toFixed(2) + "px",
        );
      }

      /** Reusable Ableton-style m:s.ms scrubber. */
      function createTimeField(options) {
        options = options || {};
        var readOnly = !!options.readOnly;
        var onChange = options.onChange || function () {};
        var root = document.createElement("div");
        root.className = "time-field" + (readOnly ? " is-readonly" : "");
        if (options.id) root.id = options.id;
        if (options.ariaLabel) root.setAttribute("aria-label", options.ariaLabel);

        var units = [
          { unit: "min", digits: 1, pad: 1, sep: null },
          { unit: "sec", digits: 2, pad: 2, sep: ":" },
          { unit: "ms", digits: 3, pad: 3, sep: "." },
        ];
        // Display spans (text-box trim works here). Inputs only for typing.
        var values = {};
        var inputs = {};
        var segs = {};
        var parts = { min: 0, sec: 0, ms: 0 };
        var enabled = true;
        var armedUnit = null;
        var typingUnit = null;
        var scrub = null;

        units.forEach(function (spec) {
          if (spec.sep) {
            var sep = document.createElement("span");
            sep.className = "time-sep";
            sep.textContent = spec.sep;
            sep.setAttribute("aria-hidden", "true");
            root.appendChild(sep);
          }
          var seg = document.createElement("span");
          seg.className = "time-seg";
          seg.dataset.unit = spec.unit;

          var valueEl = document.createElement("span");
          valueEl.className = "time-seg-value";
          valueEl.setAttribute("aria-hidden", "true");

          var input = document.createElement("input");
          input.className = "time-seg-input";
          input.type = "text";
          input.inputMode = "numeric";
          input.spellcheck = false;
          input.autocomplete = "off";
          input.maxLength = Math.max(spec.digits, 4);
          input.dataset.unit = spec.unit;
          input.setAttribute(
            "aria-label",
            spec.unit === "min"
              ? "Minutes"
              : spec.unit === "sec"
                ? "Seconds"
                : "Milliseconds",
          );
          if (readOnly) {
            input.tabIndex = -1;
            input.disabled = true;
          }

          seg.appendChild(valueEl);
          seg.appendChild(input);
          root.appendChild(seg);
          values[spec.unit] = valueEl;
          inputs[spec.unit] = input;
          segs[spec.unit] = seg;
        });

        if (readOnly) {
          root.addEventListener("selectstart", function (e) {
            e.preventDefault();
          });
        }

        function formatUnit(unit) {
          if (unit === "min") return String(parts.min);
          if (unit === "sec") return String(parts.sec).padStart(2, "0");
          return String(parts.ms).padStart(3, "0");
        }

        function renderParts() {
          ["min", "sec", "ms"].forEach(function (unit) {
            var text = formatUnit(unit);
            values[unit].textContent = text;
            if (typingUnit !== unit) inputs[unit].value = text;
          });
        }

        function currentSeconds() {
          return joinTime(parts.min, parts.sec, parts.ms);
        }

        function setSeconds(seconds) {
          if (armedUnit || typingUnit || scrub) return;
          parts = splitTime(seconds);
          renderParts();
        }

        function setEnabled(next) {
          enabled = !!next && !readOnly;
          root.classList.toggle("is-disabled", !enabled && !readOnly);
          Object.keys(inputs).forEach(function (unit) {
            inputs[unit].disabled = !enabled && !readOnly;
          });
        }

        function clearFocusState() {
          root.classList.remove("is-armed", "is-editing");
          Object.keys(segs).forEach(function (unit) {
            segs[unit].classList.remove("is-armed", "is-editing");
          });
        }

        function disarmUnit() {
          armedUnit = null;
          typingUnit = null;
          clearFocusState();
        }

        function commitTyping(unit) {
          if (typingUnit !== unit) return;
          var input = inputs[unit];
          var raw = String(input.value || "").replace(/[^\d]/g, "");
          var value = raw === "" ? 0 : parseInt(raw, 10);
          if (!Number.isFinite(value)) value = parts[unit];
          if (unit === "sec") value = Math.max(0, Math.min(59, value));
          if (unit === "ms") value = Math.max(0, Math.min(999, value));
          if (unit === "min") value = Math.max(0, value);
          parts[unit] = value;
          parts = normalizeTimeParts(parts);
          typingUnit = null;
          clearFocusState();
          renderParts();
          onChange(currentSeconds());
        }

        function armUnit(unit) {
          if (readOnly || !enabled) return;
          if (typingUnit && typingUnit !== unit) commitTyping(typingUnit);
          typingUnit = null;
          armedUnit = unit;
          clearFocusState();
          root.classList.add("is-armed");
          segs[unit].classList.add("is-armed");
          // Focus invisible input for key capture; span stays visible (trimmed).
          inputs[unit].focus({ preventScroll: true });
        }

        function beginTyping(unit, firstDigit) {
          if (readOnly || !enabled) return;
          armedUnit = null;
          typingUnit = unit;
          clearFocusState();
          root.classList.add("is-editing");
          segs[unit].classList.add("is-editing");
          var input = inputs[unit];
          input.value = firstDigit;
          input.focus({ preventScroll: true });
          try {
            input.setSelectionRange(1, 1);
          } catch (_) {}
        }

        function applyScrubDelta(unit, delta) {
          if (!delta) return;
          parts = adjustTimeUnit(parts, unit, delta);
          renderParts();
          onChange(currentSeconds());
          if (typeof options.getSeconds === "function") {
            parts = splitTime(options.getSeconds());
            renderParts();
          }
        }

        function endScrubSession() {
          if (!scrub) return;
          var session = scrub;
          scrub = null;
          root.classList.remove("is-scrubbing");
          document.removeEventListener("pointermove", session.onMove, true);
          document.removeEventListener("pointerup", session.onUp, true);
          document.removeEventListener("pointercancel", session.onUp, true);
          if (session.captureEl && session.pointerId != null) {
            try {
              if (session.captureEl.hasPointerCapture(session.pointerId)) {
                session.captureEl.releasePointerCapture(session.pointerId);
              }
            } catch (_) {}
          }
          if (!session.moved) armUnit(session.unit);
          else if (typeof options.getSeconds === "function") {
            parts = splitTime(options.getSeconds());
            renderParts();
          }
        }

        function bindSegment(unit) {
          var seg = segs[unit];
          var input = inputs[unit];

          seg.addEventListener("pointerdown", function (e) {
            if (readOnly || !enabled || e.button !== 0) return;
            if (typingUnit === unit) commitTyping(unit);
            else if (typingUnit && typingUnit !== unit) commitTyping(typingUnit);
            e.preventDefault();
            if (armedUnit) {
              segs[armedUnit].classList.remove("is-armed");
              root.classList.remove("is-armed");
              armedUnit = null;
            }

            var session = {
              unit: unit,
              moved: false,
              accum: 0,
              lastY: e.clientY,
              startY: e.clientY,
              pointerId: e.pointerId,
              captureEl: seg,
              stepPx: unit === "ms" ? 2 : unit === "sec" ? 3 : 4,
              onMove: null,
              onUp: null,
            };
            scrub = session;
            root.classList.add("is-scrubbing");
            try {
              seg.setPointerCapture(e.pointerId);
            } catch (_) {}

            session.onMove = function (ev) {
              if (!scrub || scrub !== session) return;
              if (typeof ev.clientY !== "number") return;
              var probe = Math.abs(ev.clientY - session.startY);
              if (probe >= 2) session.moved = true;
              if (!session.moved) {
                session.lastY = ev.clientY;
                return;
              }
              var dy = ev.clientY - session.lastY;
              session.lastY = ev.clientY;
              if (!dy) return;
              session.accum += -dy;
              while (session.accum >= session.stepPx) {
                session.accum -= session.stepPx;
                applyScrubDelta(unit, 1);
              }
              while (session.accum <= -session.stepPx) {
                session.accum += session.stepPx;
                applyScrubDelta(unit, -1);
              }
            };

            session.onUp = function () {
              endScrubSession();
            };

            document.addEventListener("pointermove", session.onMove, true);
            document.addEventListener("pointerup", session.onUp, true);
            document.addEventListener("pointercancel", session.onUp, true);
          });

          input.addEventListener("keydown", function (e) {
            if (armedUnit === unit) {
              if (/^[0-9]$/.test(e.key)) {
                e.preventDefault();
                beginTyping(unit, e.key);
                return;
              }
              if (e.key === "Enter" || e.key === "Escape") {
                e.preventDefault();
                disarmUnit();
                input.blur();
                renderParts();
                return;
              }
              if (
                e.key.length === 1 ||
                e.key === "Backspace" ||
                e.key === "Delete"
              ) {
                e.preventDefault();
              }
              return;
            }
            if (typingUnit !== unit) return;
            if (e.key === "Enter") {
              e.preventDefault();
              commitTyping(unit);
              input.blur();
            } else if (e.key === "Escape") {
              e.preventDefault();
              typingUnit = null;
              clearFocusState();
              renderParts();
              input.blur();
            }
          });

          input.addEventListener("beforeinput", function (e) {
            if (armedUnit !== unit) return;
            var data = e.data || "";
            if (/^[0-9]$/.test(data)) {
              e.preventDefault();
              beginTyping(unit, data);
            } else if (data) {
              e.preventDefault();
            }
          });

          input.addEventListener("blur", function () {
            if (typingUnit === unit) {
              commitTyping(unit);
              return;
            }
            if (armedUnit === unit) {
              disarmUnit();
              renderParts();
            }
          });
        }

        if (!readOnly) {
          bindSegment("min");
          bindSegment("sec");
          bindSegment("ms");
        }

        renderParts();
        setEnabled(true);

        if (options.host) options.host.appendChild(root);
        applyTimeInkNudge(root);
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready
            .then(function () {
              applyTimeInkNudge(root);
            })
            .catch(function () {});
        }

        return {
          root: root,
          setSeconds: setSeconds,
          getSeconds: currentSeconds,
          setEnabled: setEnabled,
          isBusy: function () {
            return !!(armedUnit || typingUnit || scrub);
          },
        };
      }

      var clipFields = {
        start: null,
        end: null,
        length: null,
      };

      function currentItem() {
        return visible[selected] || null;
      }

      function candidateKey(item) {
        if (!item) return "";
        var c = item.candidate;
        return c.source + ":" + c.id + ":" + c.url;
      }

      function isAgeRestrictedItem(item) {
        return !!item && item.previewWarning === AGE_RESTRICTED_WARNING;
      }

      function stopPreview(opts) {
        opts = opts || {};
        var preserveYoutube = !!opts.preserveYoutube;
        var preserveSoundcloud = !!opts.preserveSoundcloud;
        if (previewAbort) previewAbort.abort();
        previewAbort = null;
        clearInterval(youtubePoll);
        youtubePoll = null;
        clearTimeout(youtubeRetryTimer);
        youtubeRetryTimer = null;
        clearTimeout(youtubeLoadTimer);
        youtubeLoadTimer = null;
        clearTimeout(soundcloudRetryTimer);
        soundcloudRetryTimer = null;
        clearTimeout(soundcloudLoadTimer);
        soundcloudLoadTimer = null;
        if (dragFrame != null) cancelAnimationFrame(dragFrame);
        dragFrame = null;
        dragPendingTime = null;
        dragTimelineRect = null;
        dragPreviewTime = null;
        draggingTimeline = null;
        document
          .getElementById("timeline")
          ?.classList.remove("playhead-active");
        youtubeReadyHandler = null;
        youtubeStateHandler = null;
        youtubeErrorHandler = null;
        if (youtubePlayer && typeof youtubePlayer.destroy === "function") {
          if (preserveYoutube) {
            try {
              youtubePlayer.pauseVideo();
            } catch (_) {}
          } else {
            try {
              youtubePlayer.destroy();
            } catch (_) {}
            youtubePlayer = null;
            youtubePlayerReady = false;
          }
        }
        if (soundcloudWidget) {
          try {
            soundcloudWidget.pause();
          } catch (_) {}
          if (!preserveSoundcloud) {
            soundcloudWidget = null;
            soundcloudWidgetReady = false;
            soundcloudTrackUrl = "";
          }
        }
        previewProvider = "";
        providerCurrentTime = 0;
        providerPaused = true;
        stoppedAtRangeEnd = false;
        lastStoppedPreviewTime = 0;
        var providerHost = document.getElementById("providerHost");
        if (providerHost && !preserveYoutube && !preserveSoundcloud) {
          providerHost.innerHTML = "";
          providerHost.hidden = true;
        }
        var audio = document.getElementById("previewAudio");
        if (audio) {
          audio.pause();
          audio.removeAttribute("src");
          audio.load();
        }
      }

      function resetPreview(item) {
        var preserveYoutube =
          !!item &&
          item.candidate.source === "youtube" &&
          /^[a-zA-Z0-9_-]{11}$/.test(item.candidate.id);
        var preserveSoundcloud =
          !!item && item.candidate.source === "soundcloud";
        stopPreview({
          preserveYoutube: preserveYoutube,
          preserveSoundcloud: preserveSoundcloud,
        });
        previewGen += 1;
        previewItemKey = candidateKey(item);
        previewDuration =
          item && Number.isFinite(item.candidate.durationS)
            ? Math.max(0, item.candidate.durationS)
            : 0;
        previewStart = 0;
        previewEnd = previewDuration;
        lastStoppedPreviewTime = previewStart;
        previewLoading = false;
        previewReady = false;
        previewError = isAgeRestrictedItem(item) ? AGE_RESTRICTED_MESSAGE : "";
        updatePreviewUi();
        if (item && !isAgeRestrictedItem(item)) {
          loadPreview(item, previewGen);
        }
      }

      function rawPreviewErrorMessage(err) {
        return String(err && err.message ? err.message : err).split("\n")[0];
      }

      function isAgeRestrictedPreviewError(item, err) {
        if (!item || item.candidate.source !== "youtube") return false;
        return /(?:\bage[- ]?restrict(?:ed|ion)?\b|\b(?:confirm|verify) (?:your )?age\b|\bmay be inappropriate for some users\b)/i.test(
          rawPreviewErrorMessage(err),
        );
      }

      function previewErrorMessage(err, item) {
        if (isAgeRestrictedPreviewError(item, err)) {
          return AGE_RESTRICTED_MESSAGE;
        }
        return rawPreviewErrorMessage(err).slice(0, 150);
      }

      function applyPreviewError(item, err) {
        var ageRestricted = isAgeRestrictedPreviewError(item, err);
        previewError = ageRestricted
          ? AGE_RESTRICTED_MESSAGE
          : previewErrorMessage(err, item);
        if (ageRestricted) item.previewWarning = AGE_RESTRICTED_WARNING;
        return ageRestricted;
      }

      function focusPreviewTransport() {
        var active = document.activeElement;
        var search = document.getElementById("q");
        if (active !== search && active !== document.body) return;
        var toggle = document.getElementById("previewToggle");
        try {
          toggle.focus({ preventScroll: true });
        } catch (_) {
          toggle.focus();
        }
      }

      function applyPreviewDuration(duration) {
        if (!Number.isFinite(duration) || duration <= 0) return;
        var wasTrimmed = selectionIsTrimmed();
        previewDuration = duration;
        previewStart = Math.min(previewStart, previewDuration);
        previewEnd = wasTrimmed
          ? Math.min(previewEnd, previewDuration)
          : previewDuration;
      }

      function ensureYoutubeApi() {
        if (window.YT && typeof window.YT.Player === "function") {
          return Promise.resolve(window.YT);
        }
        if (youtubeApiPromise) return youtubeApiPromise;
        youtubeApiPromise = new Promise(function (resolve, reject) {
          var settled = false;
          var previous = window.onYouTubeIframeAPIReady;
          var timeout = setTimeout(function () {
            if (settled) return;
            settled = true;
            youtubeApiPromise = null;
            reject(new Error("YouTube preview timed out"));
          }, 8_000);
          window.onYouTubeIframeAPIReady = function () {
            if (typeof previous === "function") previous();
            if (settled) return;
            settled = true;
            clearTimeout(timeout);
            resolve(window.YT);
          };
          var script = document.createElement("script");
          script.src = "https://www.youtube.com/iframe_api";
          script.onerror = function () {
            if (settled) return;
            settled = true;
            clearTimeout(timeout);
            youtubeApiPromise = null;
            reject(new Error("YouTube preview could not load"));
          };
          document.head.appendChild(script);
        });
        return youtubeApiPromise;
      }

      function createYoutubeIframe(host, item) {
        host.innerHTML = "";
        var iframe = document.createElement("iframe");
        iframe.id = "youtubeMount";
        iframe.width = "200";
        iframe.height = "200";
        iframe.tabIndex = -1;
        iframe.title = "YouTube preview";
        iframe.setAttribute("aria-hidden", "true");
        iframe.setAttribute(
          "sandbox",
          "allow-scripts allow-same-origin allow-presentation",
        );
        iframe.setAttribute("allow", "autoplay; encrypted-media");
        iframe.referrerPolicy = "strict-origin-when-cross-origin";
        var params = new URLSearchParams({
          enablejsapi: "1",
          autoplay: "1",
          controls: "0",
          disablekb: "1",
          playsinline: "1",
          rel: "0",
          origin: window.location.origin,
          widget_referrer: window.location.href,
        });
        iframe.src =
          "https://www.youtube.com/embed/" +
          encodeURIComponent(item.candidate.id) +
          "?" +
          params.toString();
        host.appendChild(iframe);
        return iframe;
      }

      function soundcloudWidgetOptions() {
        return {
          auto_play: true,
          hide_related: true,
          show_comments: false,
          show_user: false,
          show_reposts: false,
          show_teaser: false,
          visual: false,
          show_artwork: false,
          download: false,
          buying: false,
          sharing: false,
        };
      }

      function soundcloudEmbedSrc(item) {
        var params = new URLSearchParams(
          Object.assign(
            { url: item.candidate.url },
            soundcloudWidgetOptions(),
          ),
        );
        return "https://w.soundcloud.com/player/?" + params.toString();
      }

      function createSoundcloudIframe(host, item) {
        host.innerHTML = "";
        var iframe = document.createElement("iframe");
        iframe.id = "soundcloudMount";
        iframe.width = "200";
        iframe.height = "200";
        iframe.tabIndex = -1;
        iframe.title = "SoundCloud preview";
        iframe.setAttribute("aria-hidden", "true");
        iframe.setAttribute(
          "sandbox",
          "allow-scripts allow-same-origin allow-presentation allow-popups",
        );
        iframe.setAttribute("allow", "autoplay");
        iframe.referrerPolicy = "strict-origin-when-cross-origin";
        iframe.src = soundcloudEmbedSrc(item);
        host.appendChild(iframe);
        return iframe;
      }

      function ensureSoundcloudApi() {
        if (window.SC && typeof window.SC.Widget === "function") {
          return Promise.resolve(window.SC);
        }
        if (soundcloudApiPromise) return soundcloudApiPromise;
        soundcloudApiPromise = new Promise(function (resolve, reject) {
          var settled = false;
          var timeout = setTimeout(function () {
            if (settled) return;
            settled = true;
            soundcloudApiPromise = null;
            reject(new Error("SoundCloud preview timed out"));
          }, 8_000);
          var script = document.createElement("script");
          script.src = "https://w.soundcloud.com/player/api.js";
          script.onload = function () {
            if (settled) return;
            if (window.SC && typeof window.SC.Widget === "function") {
              settled = true;
              clearTimeout(timeout);
              resolve(window.SC);
              return;
            }
            settled = true;
            clearTimeout(timeout);
            soundcloudApiPromise = null;
            reject(new Error("SoundCloud preview could not load"));
          };
          script.onerror = function () {
            if (settled) return;
            settled = true;
            clearTimeout(timeout);
            soundcloudApiPromise = null;
            reject(new Error("SoundCloud preview could not load"));
          };
          document.head.appendChild(script);
        });
        return soundcloudApiPromise;
      }

      async function loadSoundcloudPreview(item, gen, attempt) {
        attempt = attempt || 0;
        clearTimeout(soundcloudRetryTimer);
        soundcloudRetryTimer = null;
        clearTimeout(soundcloudLoadTimer);
        soundcloudLoadTimer = null;
        clearInterval(youtubePoll);
        youtubePoll = null;
        previewProvider = "soundcloud";
        previewLoading = true;
        previewReady = false;
        previewError = "";
        providerPaused = true;
        soundcloudTrackUrl = item.candidate.url;
        var host = document.getElementById("providerHost");
        host.hidden = false;
        updatePreviewUi();

        var handledFailure = false;
        function retryOrFallback() {
          if (handledFailure || gen !== previewGen) return;
          handledFailure = true;
          clearTimeout(soundcloudLoadTimer);
          soundcloudLoadTimer = null;
          clearInterval(youtubePoll);
          youtubePoll = null;
          soundcloudWidget = null;
          soundcloudWidgetReady = false;
          soundcloudTrackUrl = "";
          host.innerHTML = "";
          host.hidden = true;
          previewReady = false;
          providerPaused = true;
          if (attempt < 1) {
            previewLoading = true;
            previewError = "";
            updatePreviewUi();
            soundcloudRetryTimer = setTimeout(function () {
              soundcloudRetryTimer = null;
              if (gen === previewGen) {
                void loadSoundcloudPreview(item, gen, attempt + 1);
              }
            }, 250);
          } else {
            void loadDirectPreview(item, gen);
          }
        }

        function startPolling() {
          clearInterval(youtubePoll);
          youtubePoll = setInterval(function () {
            if (
              !soundcloudWidget ||
              handledFailure ||
              gen !== previewGen ||
              draggingTimeline
            ) {
              return;
            }
            try {
              soundcloudWidget.getPosition(function (ms) {
                if (handledFailure || gen !== previewGen) return;
                providerCurrentTime = Math.max(0, (ms || 0) / 1000);
                if (providerCurrentTime < previewStart) {
                  soundcloudWidget.seekTo(previewStart * 1000);
                  providerCurrentTime = previewStart;
                } else if (
                  providerCurrentTime > previewEnd ||
                  (!providerPaused &&
                    providerCurrentTime >= previewEnd - 0.02)
                ) {
                  soundcloudWidget.pause();
                  soundcloudWidget.seekTo(previewEnd * 1000);
                  providerPaused = true;
                  providerCurrentTime = previewEnd;
                  stoppedAtRangeEnd = true;
                  lastStoppedPreviewTime = previewEnd;
                }
                updatePlaybackUi();
              });
              soundcloudWidget.getDuration(function (ms) {
                if (handledFailure || gen !== previewGen) return;
                applyPreviewDuration(Math.max(0, (ms || 0) / 1000));
                updatePreviewUi();
              });
            } catch (_) {}
          }, 100);
        }

        function activateWidget(widget, reload) {
          if (handledFailure || gen !== previewGen) return;
          clearTimeout(soundcloudLoadTimer);
          soundcloudLoadTimer = null;
          function afterReady() {
            if (handledFailure || gen !== previewGen) return;
            previewLoading = false;
            previewReady = true;
            previewError = "";
            providerPaused = false;
            stoppedAtRangeEnd = false;
            try {
              widget.seekTo(previewStart * 1000);
              widget.play();
            } catch (_) {
              retryOrFallback();
              return;
            }
            soundcloudLoadTimer = setTimeout(function () {
              soundcloudLoadTimer = null;
              if (gen !== previewGen || handledFailure) return;
              try {
                widget.isPaused(function (paused) {
                  if (gen !== previewGen || handledFailure) return;
                  if (paused) retryOrFallback();
                });
              } catch (_) {
                retryOrFallback();
              }
            }, 4_000);
            startPolling();
            updatePreviewUi();
            focusPreviewTransport();
          }
          if (reload) {
            try {
              widget.load(
                item.candidate.url,
                Object.assign({}, soundcloudWidgetOptions(), {
                  callback: afterReady,
                }),
              );
            } catch (_) {
              retryOrFallback();
            }
            return;
          }
          afterReady();
        }

        try {
          var SC = await ensureSoundcloudApi();
          if (gen !== previewGen) return;
          if (soundcloudWidget && soundcloudWidgetReady) {
            activateWidget(soundcloudWidget, true);
            return;
          }
          soundcloudWidget = null;
          soundcloudWidgetReady = false;
          var iframe = createSoundcloudIframe(host, item);
          soundcloudWidget = SC.Widget(iframe);
          soundcloudWidget.bind(SC.Widget.Events.READY, function () {
            soundcloudWidgetReady = true;
            if (handledFailure || gen !== previewGen) return;
            activateWidget(soundcloudWidget, false);
          });
          soundcloudWidget.bind(SC.Widget.Events.PLAY, function () {
            if (handledFailure || gen !== previewGen) return;
            clearTimeout(soundcloudLoadTimer);
            soundcloudLoadTimer = null;
            providerPaused = false;
            updatePlaybackUi();
          });
          soundcloudWidget.bind(SC.Widget.Events.PAUSE, function () {
            if (handledFailure || gen !== previewGen) return;
            providerPaused = true;
            updatePlaybackUi();
          });
          soundcloudWidget.bind(SC.Widget.Events.PLAY_PROGRESS, function (data) {
            if (handledFailure || gen !== previewGen || draggingTimeline) {
              return;
            }
            providerCurrentTime = Math.max(
              0,
              ((data && data.currentPosition) || 0) / 1000,
            );
            updatePlaybackUi();
          });
          soundcloudWidget.bind(SC.Widget.Events.ERROR, function () {
            if (handledFailure || gen !== previewGen) return;
            console.warn("[preview] SoundCloud widget error");
            retryOrFallback();
          });
          soundcloudLoadTimer = setTimeout(retryOrFallback, 8_000);
        } catch (_) {
          retryOrFallback();
        }
      }

      async function loadYoutubePreview(item, gen, attempt) {
        attempt = attempt || 0;
        clearTimeout(youtubeRetryTimer);
        youtubeRetryTimer = null;
        clearTimeout(youtubeLoadTimer);
        youtubeLoadTimer = null;
        previewProvider = "youtube";
        previewLoading = true;
        previewReady = false;
        previewError = "";
        providerPaused = true;
        var host = document.getElementById("providerHost");
        host.hidden = false;
        updatePreviewUi();

        var handledFailure = false;
        function isCurrentVideo() {
          if (!youtubePlayer) return false;
          try {
            var videoId = youtubePlayer.getVideoData()?.video_id;
            return !videoId || videoId === item.candidate.id;
          } catch (_) {
            return true;
          }
        }

        function retryOrFallback() {
          if (handledFailure || gen !== previewGen) return;
          handledFailure = true;
          clearTimeout(youtubeLoadTimer);
          youtubeLoadTimer = null;
          clearInterval(youtubePoll);
          youtubePoll = null;
          youtubeReadyHandler = null;
          youtubeStateHandler = null;
          youtubeErrorHandler = null;
          try {
            youtubePlayer?.destroy();
          } catch (_) {}
          youtubePlayer = null;
          youtubePlayerReady = false;
          host.innerHTML = "";
          host.hidden = true;
          previewReady = false;
          providerPaused = true;
          if (attempt < 1) {
            previewLoading = true;
            previewError = "";
            updatePreviewUi();
            youtubeRetryTimer = setTimeout(function () {
              youtubeRetryTimer = null;
              if (gen === previewGen) {
                void loadYoutubePreview(item, gen, attempt + 1);
              }
            }, 250);
          } else {
            void loadDirectPreview(item, gen);
          }
        }

        function startPolling() {
          clearInterval(youtubePoll);
          youtubePoll = setInterval(function () {
            if (
              !youtubePlayer ||
              handledFailure ||
              gen !== previewGen ||
              !isCurrentVideo() ||
              draggingTimeline
            ) {
              return;
            }
            try {
              providerCurrentTime = youtubePlayer.getCurrentTime() || 0;
              applyPreviewDuration(youtubePlayer.getDuration());
              if (providerCurrentTime < previewStart) {
                youtubePlayer.seekTo(previewStart, true);
                providerCurrentTime = previewStart;
              } else if (
                providerCurrentTime > previewEnd ||
                (!providerPaused &&
                  providerCurrentTime >= previewEnd - 0.02)
              ) {
                youtubePlayer.pauseVideo();
                youtubePlayer.seekTo(previewEnd, true);
                providerPaused = true;
                providerCurrentTime = previewEnd;
                stoppedAtRangeEnd = true;
                lastStoppedPreviewTime = previewEnd;
              }
              updatePlaybackUi();
            } catch (_) {}
          }, 100);
        }

        function activatePlayer(target, switchVideo) {
          if (handledFailure || gen !== previewGen) return;
          clearTimeout(youtubeLoadTimer);
          youtubeLoadTimer = null;
          previewLoading = true;
          previewReady = true;
          previewError = "";
          providerPaused = true;
          stoppedAtRangeEnd = false;
          updatePreviewUi();
          if (switchVideo) {
            target.loadVideoById({
              videoId: item.candidate.id,
              startSeconds: previewStart,
              suggestedQuality: "small",
            });
          }
          if (typeof target.setPlaybackQuality === "function") {
            target.setPlaybackQuality("small");
          }
          target.playVideo();
          youtubeLoadTimer = setTimeout(function () {
            youtubeLoadTimer = null;
            if (gen !== previewGen || handledFailure) return;
            var state = youtubePlayer?.getPlayerState();
            if (
              !isCurrentVideo() ||
              (state !== YT.PlayerState.PLAYING &&
                state !== YT.PlayerState.BUFFERING)
            ) {
              retryOrFallback();
            }
          }, 4_000);
          startPolling();
          focusPreviewTransport();
        }

        var YT;
        try {
          YT = await ensureYoutubeApi();
          if (gen !== previewGen) return;
          youtubeReadyHandler = function (event) {
            activatePlayer(event.target, true);
          };
          youtubeStateHandler = function (event) {
            if (handledFailure || gen !== previewGen) return;
            // During loadVideoById the reported id can lag; still accept
            // play/pause while this preview generation is loading.
            if (!isCurrentVideo() && !previewLoading) return;
            if (event.data === YT.PlayerState.PLAYING) {
              clearTimeout(youtubeLoadTimer);
              youtubeLoadTimer = null;
              previewLoading = false;
              previewReady = true;
              previewError = "";
              providerPaused = false;
            } else if (
              event.data === YT.PlayerState.PAUSED ||
              event.data === YT.PlayerState.ENDED ||
              event.data === YT.PlayerState.CUED
            ) {
              previewLoading = false;
              providerPaused = true;
            } else if (event.data === YT.PlayerState.BUFFERING) {
              providerPaused = false;
            }
            updatePlaybackUi();
          };
          youtubeErrorHandler = function (event) {
            if (!isCurrentVideo()) return;
            console.warn("[preview] YouTube iframe error", event.data);
            retryOrFallback();
          };

          if (youtubePlayer && youtubePlayerReady) {
            activatePlayer(youtubePlayer, true);
            return;
          }
          if (youtubePlayer) {
            youtubeLoadTimer = setTimeout(retryOrFallback, 6_000);
            return;
          }

          var iframe = createYoutubeIframe(host, item);
          youtubePlayer = new YT.Player(iframe, {
            events: {
              onReady: function (event) {
                youtubePlayerReady = true;
                youtubeReadyHandler?.(event);
              },
              onStateChange: function (event) {
                youtubeStateHandler?.(event);
              },
              onError: function (event) {
                youtubeErrorHandler?.(event);
              },
            },
          });
          youtubeLoadTimer = setTimeout(retryOrFallback, 6_000);
        } catch (_) {
          retryOrFallback();
        }
      }

      async function loadDirectPreview(item, gen) {
        var ctrl = new AbortController();
        previewAbort = ctrl;
        previewProvider = "audio";
        previewLoading = true;
        previewReady = false;
        previewError = "";
        updatePreviewUi();
        try {
          var res = await fetch("/preview", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ candidate: item.candidate }),
            signal: ctrl.signal,
          });
          if (gen !== previewGen) return;
          if (!res.ok) {
            var body = null;
            try {
              body = await res.json();
            } catch (_) {}
            throw new Error(
              body && body.error
                ? String(body.error).split("\n")[0]
                : "Preview HTTP " + res.status,
            );
          }
          var data = await res.json();
          if (gen !== previewGen) return;
          applyPreviewDuration(data.durationS);
          var audio = document.getElementById("previewAudio");
          audio.src = data.mediaUrl;
          audio.addEventListener(
            "canplay",
            function () {
              if (gen === previewGen && previewReady) {
                playPreviewAt(previewStart);
              }
            },
            { once: true },
          );
          audio.load();
          updatePreviewUi();
        } catch (err) {
          if (gen !== previewGen || ctrl.signal.aborted) return;
          previewLoading = false;
          previewReady = false;
          if (applyPreviewError(item, err)) render();
          else updatePreviewUi();
        } finally {
          if (previewAbort === ctrl) previewAbort = null;
        }
      }

      function loadPreview(item, gen) {
        if (isAgeRestrictedItem(item)) {
          previewLoading = false;
          previewReady = false;
          previewError = AGE_RESTRICTED_MESSAGE;
          updatePreviewUi();
          return;
        }
        if (
          item.candidate.source === "youtube" &&
          /^[a-zA-Z0-9_-]{11}$/.test(item.candidate.id)
        ) {
          void loadYoutubePreview(item, gen, 0);
          return;
        }
        if (item.candidate.source === "soundcloud") {
          void loadSoundcloudPreview(item, gen, 0);
          return;
        }
        void loadDirectPreview(item, gen);
      }

      function selectionIsTrimmed() {
        return (
          previewDuration > 0 &&
          (previewStart > 0.05 || previewEnd < previewDuration - 0.25)
        );
      }

      function updatePreviewUi() {
        var panel = document.getElementById("preview");
        if (!panel) return;
        var item = currentItem();
        var ageRestricted = isAgeRestrictedItem(item);
        panel.classList.toggle("age-restricted", ageRestricted);
        var importButton = document.getElementById("importButton");
        if (importButton) importButton.disabled = !item || ageRestricted;
        panel.hidden = !item;
        if (!item) return;

        document.getElementById("previewTitle").textContent =
          item.candidate.title;
        var status =
          item.subtitle ||
          item.candidate.artists.join(", ") ||
          item.candidate.channel ||
          item.candidate.source;
        if (previewError) status = previewError;
        document.getElementById("previewStatus").textContent = status;
        var brand = item.brand || item.candidate.source;
        document.getElementById("previewBadge").innerHTML = brandIcon(brand);

        var hasDuration = previewDuration > 0;
        var startPct = hasDuration
          ? Math.max(0, Math.min(100, (previewStart / previewDuration) * 100))
          : 0;
        var endPct = hasDuration
          ? Math.max(0, Math.min(100, (previewEnd / previewDuration) * 100))
          : 100;
        var selection = document.getElementById("timelineSelection");
        selection.style.left = startPct + "%";
        selection.style.width = Math.max(0, endPct - startPct) + "%";
        document.getElementById("startHandle").style.left = startPct + "%";
        document.getElementById("endHandle").style.left = endPct + "%";
        document.getElementById("endHandle").style.right = "";
        document.getElementById("startHandle").disabled = !hasDuration;
        document.getElementById("endHandle").disabled = !hasDuration;
        if (clipFields.start) {
          clipFields.start.setSeconds(previewStart);
          clipFields.start.setEnabled(hasDuration);
        }
        if (clipFields.end) {
          clipFields.end.setSeconds(previewEnd);
          clipFields.end.setEnabled(hasDuration);
        }
        if (clipFields.length) {
          clipFields.length.setSeconds(
            hasDuration ? Math.max(0, previewEnd - previewStart) : 0,
          );
          clipFields.length.setEnabled(hasDuration);
        }
        var startSet = document.querySelector('.clip-params [data-set="start"]');
        var endSet = document.querySelector('.clip-params [data-set="end"]');
        if (startSet) startSet.disabled = !hasDuration || !previewReady;
        if (endSet) endSet.disabled = !hasDuration || !previewReady;
        updatePlaybackUi();
      }

      function currentPreviewTime() {
        if (previewProvider === "youtube") {
          if (youtubePlayer && typeof youtubePlayer.getCurrentTime === "function") {
            try {
              providerCurrentTime = youtubePlayer.getCurrentTime() || 0;
            } catch (_) {}
          }
          return providerCurrentTime;
        }
        if (previewProvider === "soundcloud") {
          return providerCurrentTime;
        }
        var audio = document.getElementById("previewAudio");
        return audio && Number.isFinite(audio.currentTime) ? audio.currentTime : 0;
      }

      function previewIsPaused() {
        if (previewProvider === "youtube" || previewProvider === "soundcloud") {
          return providerPaused;
        }
        var audio = document.getElementById("previewAudio");
        return !audio || audio.paused;
      }

      function constrainPreviewTime(time) {
        if (!(previewDuration > 0)) return 0;
        return Math.max(previewStart, Math.min(previewEnd, time));
      }

      function seekPreview(time) {
        var safe = constrainPreviewTime(time);
        var wasPaused = previewIsPaused();
        providerCurrentTime = safe;
        stoppedAtRangeEnd = false;
        if (previewProvider === "youtube") {
          if (youtubePlayer && typeof youtubePlayer.seekTo === "function") {
            youtubePlayer.seekTo(safe, true);
          }
        } else if (previewProvider === "soundcloud") {
          if (soundcloudWidget && typeof soundcloudWidget.seekTo === "function") {
            soundcloudWidget.seekTo(safe * 1000);
          }
        } else {
          var audio = document.getElementById("previewAudio");
          if (audio && previewReady) audio.currentTime = safe;
        }
        if (wasPaused) lastStoppedPreviewTime = safe;
        updatePlaybackUi();
      }

      function pausePreviewAt(time) {
        if (previewProvider === "youtube") {
          if (youtubePlayer && typeof youtubePlayer.pauseVideo === "function") {
            youtubePlayer.pauseVideo();
          }
        } else if (previewProvider === "soundcloud") {
          if (soundcloudWidget && typeof soundcloudWidget.pause === "function") {
            soundcloudWidget.pause();
          }
        } else {
          var audio = document.getElementById("previewAudio");
          if (audio) audio.pause();
        }
        providerPaused = true;
        seekPreview(time);
        stoppedAtRangeEnd = true;
        lastStoppedPreviewTime = constrainPreviewTime(time);
      }

      function playPreviewAt(time) {
        if (!previewReady) return;
        seekPreview(time);
        stoppedAtRangeEnd = false;
        if (previewProvider === "youtube") {
          if (youtubePlayer && typeof youtubePlayer.playVideo === "function") {
            youtubePlayer.playVideo();
            providerPaused = false;
          }
        } else if (previewProvider === "soundcloud") {
          if (soundcloudWidget && typeof soundcloudWidget.play === "function") {
            soundcloudWidget.play();
            providerPaused = false;
          }
        } else {
          var audio = document.getElementById("previewAudio");
          audio.play().catch(function (err) {
            previewError = previewErrorMessage(err);
            updatePreviewUi();
          });
        }
        updatePlaybackUi();
      }

      function updatePlaybackUi() {
        var toggle = document.getElementById("previewToggle");
        if (!toggle) return;
        var paused = previewIsPaused();
        var controlsEnabled = previewReady && !previewLoading;
        toggle.disabled = !controlsEnabled;
        var rewind = document.getElementById("previewRewind");
        var forward = document.getElementById("previewForward");
        if (rewind) rewind.disabled = !controlsEnabled;
        if (forward) forward.disabled = !controlsEnabled;
        toggle.classList.toggle("loading", previewLoading);
        toggle.classList.toggle("playing", !previewLoading && !paused);
        var label = previewLoading
          ? "Loading preview"
          : paused
            ? "Play preview"
            : "Pause preview";
        toggle.setAttribute(
          "aria-label",
          label,
        );
        toggle.title = label;
        var current =
          draggingTimeline && dragPreviewTime != null
            ? constrainPreviewTime(dragPreviewTime)
            : constrainPreviewTime(currentPreviewTime());
        document.getElementById("previewClock").textContent =
          fmtPrecise(current) + " / " + fmtPrecise(previewDuration);
        var pct =
          previewDuration > 0
            ? Math.max(0, Math.min(100, (current / previewDuration) * 100))
            : 0;
        document.getElementById("playhead").style.left = pct + "%";
      }

      function syncPreviewPanel() {
        var item = currentItem();
        if (candidateKey(item) !== previewItemKey) {
          resetPreview(item);
        } else {
          updatePreviewUi();
        }
      }

      function updatePreviewBoundary(kind, time) {
        if (!(previewDuration > 0)) return;
        if (kind === "length") {
          var maxLen = Math.max(MIN_SELECTION_S, previewDuration - previewStart);
          var len = Math.max(MIN_SELECTION_S, Math.min(maxLen, time));
          previewEnd = Math.min(previewDuration, previewStart + len);
          updatePreviewUi();
          return;
        }
        var next = Math.max(0, Math.min(previewDuration, time));
        if (kind === "start") {
          previewStart = Math.min(next, previewEnd - MIN_SELECTION_S);
        } else {
          previewEnd = Math.max(next, previewStart + MIN_SELECTION_S);
        }
        updatePreviewUi();
      }

      function applyClipSet(kind) {
        if (!(previewDuration > 0) || !previewReady) return;
        var now = currentPreviewTime();
        if (kind === "start") {
          updatePreviewBoundary("start", now);
          if (previewReady) playPreviewAt(previewStart);
        } else if (kind === "end") {
          updatePreviewBoundary("end", now);
        }
      }

      function applyTimelineDrag(time) {
        if (!draggingTimeline) return;
        if (draggingTimeline === "playhead") {
          dragPreviewTime = constrainPreviewTime(time);
          updatePlaybackUi();
        } else {
          updatePreviewBoundary(draggingTimeline, time);
        }
      }

      function scheduleTimelineDrag(time) {
        dragPendingTime = time;
        if (dragFrame != null) return;
        dragFrame = requestAnimationFrame(function () {
          dragFrame = null;
          var pending = dragPendingTime;
          dragPendingTime = null;
          if (pending != null) applyTimelineDrag(pending);
        });
      }

      function flushTimelineDrag() {
        if (dragFrame != null) cancelAnimationFrame(dragFrame);
        dragFrame = null;
        var pending = dragPendingTime;
        dragPendingTime = null;
        if (pending != null) applyTimelineDrag(pending);
      }

      function commitTimelineDrag(kind) {
        if (kind === "playhead") {
          if (dragPreviewTime == null) return;
          if (previewReady) seekPreview(dragPreviewTime);
          else providerCurrentTime = dragPreviewTime;
          return;
        }
        if (kind === "start") {
          if (previewReady) playPreviewAt(previewStart);
          else providerCurrentTime = previewStart;
          return;
        }

        var current = currentPreviewTime();
        if (
          dragWasStoppedAtEnd &&
          previewEnd > dragInitialEnd + 0.01
        ) {
          playPreviewAt(dragInitialEnd);
        } else if (current > previewEnd) {
          if (previewReady) pausePreviewAt(previewEnd);
          else providerCurrentTime = previewEnd;
        }
      }

      function timeAtPointer(event) {
        var rect =
          dragTimelineRect ||
          document.getElementById("timeline").getBoundingClientRect();
        if (rect.width <= 0) return 0;
        var ratio = Math.max(
          0,
          Math.min(1, (event.clientX - rect.left) / rect.width),
        );
        return ratio * previewDuration;
      }

      function togglePreview(continueFromStop) {
        if (!previewReady) {
          if (previewLoading) return;
          var item = currentItem();
          if (!item) return;
          if (isAgeRestrictedItem(item)) {
            previewError = AGE_RESTRICTED_MESSAGE;
            updatePreviewUi();
            return;
          }
          previewError = "";
          loadPreview(item, previewGen);
          return;
        }
        var current = currentPreviewTime();
        if (previewIsPaused()) {
          current = previewStart;
          if (
            continueFromStop &&
            lastStoppedPreviewTime >= previewStart &&
            lastStoppedPreviewTime < previewEnd - 0.02
          ) {
            current = lastStoppedPreviewTime;
          }
          playPreviewAt(current);
        } else {
          stoppedAtRangeEnd = false;
          lastStoppedPreviewTime = constrainPreviewTime(current);

      .transport.skip-back::before,

      .transport.skip-forward::before,

      .preview-actions {

      .timeline {
        --play-bar-height: 10px;
        position: relative;
        height: 30px;
        margin: 1px 8px;
        touch-action: none;

        cursor: default;

      .timeline-track,
      .timeline-selection {

        top: 50%;

        transform: translateY(-50%);

      .timeline-track {

      .timeline-selection {

      @media (prefers-color-scheme: dark) {

      .timeline-handle {
        -webkit-appearance: none;
        appearance: none;
        position: absolute;
        z-index: 3;
        top: 0;

        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;

        outline: none;

      .timeline-handle::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 20px;

      .handle-shape {
        position: absolute;
        top: 50%;
        width: calc(var(--play-bar-height) * 0.8660254);
        height: var(--play-bar-height);
        transform: translateY(-50%);
        color: #3a3a3a;
        --handle-fill: transparent;
        display: block;
        overflow: visible;
        pointer-events: none;
      }
      /* Solid fill (focus) — flush to the range edge. */
      .handle-shape .handle-solid {
        fill: var(--handle-fill);
        stroke: none;
      }
      /* Outline — 1 viewBox unit = 1px at bar height; no stretch, no clip. */
      .handle-shape .handle-outline {
        fill: none;
        stroke: currentColor;
        stroke-width: 1;
        stroke-linejoin: miter;
        stroke-miterlimit: 2;
      }
      .timeline-handle:focus .handle-shape {
        --handle-fill: #0ef;
      }
      @media (prefers-color-scheme: dark) {
        .handle-shape {
          color: #787878;

        }

      /* Left origin: anchor at range start; triangle grows right. */
      #startHandle {
        transform: none;
        transform-origin: left center;
      }
      #startHandle::before {
        left: 0;
      }
      #startHandle .handle-shape {
        left: 0;
        right: auto;
        transform-origin: left center;
      }
      /* Right origin: same left% as range end; triangle grows left. */
      #endHandle {
        transform: none;
        transform-origin: right center;
      }
      #endHandle::before {
        right: 0;
      }
      #endHandle .handle-shape {
        left: auto;
        right: 0;
        transform-origin: right center;
      }
      .playhead {
        position: absolute;
        z-index: 4;
        top: 5px;
        bottom: 5px;
        width: 1px;
        background: var(--p-live-surface-text);
        pointer-events: none;
      }
      .timeline.playhead-active .playhead {

      }
      @media (prefers-color-scheme: dark) {
        .timeline.playhead-active .playhead {

        }

      .clip-params {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 6px;
        align-items: start;
        min-width: 0;
        margin: 2px 8px 0;
        --clip-label-gap: 4px;
        --clip-field-h: 13px;
        --clip-field-bg: #dfdfdf;
        --clip-field-border: #4f4f4f;
        --clip-field-text: #121212;
        --clip-seg-focus-bg: #cfcfcf;
        --clip-label-text: #121212;
      }
      @media (prefers-color-scheme: dark) {
        .clip-params {
          --clip-field-bg: #242424;
          --clip-field-border: #111111;
          --clip-field-text: #b5b5b5;
          --clip-seg-focus-bg: transparent;
          --clip-label-text: #b5b5b5;
        }
      }
      .clip-param {
        display: flex;
        flex-direction: column;
        gap: var(--clip-label-gap);
        width: max-content;
        max-width: 100%;
        min-width: 0;
        align-items: stretch;
      }
      .clip-param-length {
        justify-self: center;
      }
      .clip-param-end {
        justify-self: end;
      }
      .clip-param-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        min-height: 12px;
      }
      .clip-param-label {
        color: var(--clip-label-text);
        font-size: 10px;
        line-height: 1;
        white-space: nowrap;
      }
      .clip-params .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font: inherit;
        font-size: 10px;
        line-height: 1;
        height: auto;
        padding: 2px 3px;
        --time-ink-nudge: 0px;
      }
      .clip-params .button .clip-set-label {
        display: block;
        margin: 0;
        padding: 0;
        line-height: 1;
        text-box: trim-both cap alphabetic;
        text-box-trim: trim-both;
        text-box-edge: cap alphabetic;
        transform: translateY(var(--time-ink-nudge));
      }
      .time-field {
        display: inline-flex;
        align-items: center;
        box-sizing: border-box;
        height: var(--clip-field-h);
        padding: 0;
        border: 1px solid var(--clip-field-border);
        border-radius: 1px;
        background: var(--clip-field-bg);
        color: var(--clip-field-text);
        font-variant-numeric: tabular-nums;
        user-select: none;
        cursor: default;
        min-width: 0;
        line-height: normal;
        --time-ink-nudge: 0px;
        /* Hard segment widths; picker width = sum of these + separators. */

        --time-seg-sec-w: 3ch;
        --time-seg-ms-w: 3ch;
      }
      .time-field.is-disabled {
        opacity: 0.55;
      }
      .time-field.is-readonly {
        color: color-mix(in srgb, var(--clip-field-text) 75%, transparent);
        -webkit-user-select: none;
        user-select: none;
      }
      .time-field.is-readonly,
      .time-field.is-readonly * {
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
      }
      .time-sep {
        flex: 0 0 auto;
        display: block;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-size: 10px;
        line-height: 1;
        opacity: 0.85;
        pointer-events: none;
        outline: none;
        text-box: trim-both cap alphabetic;
        text-box-trim: trim-both;
        text-box-edge: cap alphabetic;
        transform: translateY(var(--time-ink-nudge));
      }
      .time-seg {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        flex: 0 0 auto;
        align-self: stretch;
        box-sizing: content-box;
        min-width: 0;
        margin: 0;
        padding: 0 1px;
        cursor: default;
      }
      .time-seg[data-unit="min"] {
        width: var(--time-seg-min-w);
      }
      .time-seg[data-unit="sec"] {
        width: var(--time-seg-sec-w);
      }
      .time-seg[data-unit="ms"] {
        width: var(--time-seg-ms-w);
      }
      .time-seg.is-armed,
      .time-seg.is-editing {
        background: var(--clip-seg-focus-bg);
      }
      /* Visible glyphs live in a span so text-box-trim can shrink-wrap ink. */
      .time-seg-value {
        display: block;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        width: 100%;
        font-size: 10px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
        text-align: right;
        pointer-events: none;
        outline: none;
        text-box: trim-both cap alphabetic;
        text-box-trim: trim-both;
        text-box-edge: cap alphabetic;
        transform: translateY(var(--time-ink-nudge));
      }
      .time-seg.is-editing .time-seg-value {
        visibility: hidden;
      }
      .time-seg-input {
        -webkit-appearance: none;
        appearance: none;
        position: absolute;
        top: 0;
        right: 1px;
        bottom: 0;
        left: 1px;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        width: auto;
        height: auto;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: transparent;
        caret-color: transparent;
        font-family: inherit;
        font-size: 10px;
        font-weight: inherit;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        text-align: right;
        cursor: default;
        outline: none;
        box-shadow: none;
        -webkit-tap-highlight-color: transparent;
        opacity: 0;
      }
      .time-seg-input:focus,
      .time-seg-input:focus-visible,
      .time-seg:focus-within {
        outline: none;
        box-shadow: none;
      }
      .time-seg.is-editing .time-seg-input {
        opacity: 1;
        color: inherit;
        caret-color: auto;
        cursor: text;
      }
      .time-field.is-readonly .time-seg-input {
        pointer-events: none;

      .footer {
        display: flex;
        gap: 4px;
        justify-content: flex-end;
        align-items: center;
        padding: 4px 6px;
        background: var(--p-live-chrome-bg);
        border-top: 0;
      }
      .button {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
        background: var(--p-live-control-bg);

        border: 1px solid var(--p-live-control-border);

        line-height: 12px;
        cursor: default;
        box-sizing: border-box;
      }

  <body>
    <div class="chrome">
      <div class="panel">
        <div class="search-row">
          <input
            class="search"
            id="q"
            type="search"
            spellcheck="false"
            autocomplete="off"
            placeholder="Search or paste a URL"
            aria-label="Search"
          />
        </div>
        <div class="sources" id="sources">
          <button
            class="sources-header"
            type="button"
            id="sourcesToggle"
            aria-expanded="true"
            aria-controls="sourcesBody"
          >
            <span>Sources</span>
            <span class="sources-arrow" aria-hidden="true"></span>
          </button>
          <div class="toolbar" id="sourcesBody">
            <div class="chips">
              <button
                class="chip"
                type="button"
                data-filter="youtube"
                title="YouTube"
              >
                <img
                  class="brand-icon"
                  src="__LOGO_YOUTUBE__"
                  alt=""
                  width="10"
                  height="10"
                />
                YouTube
              </button>
              <button
                class="chip"
                type="button"
                data-filter="youtube-music"
                title="YouTube Music"
              >
                <img
                  class="brand-icon"
                  src="__LOGO_YOUTUBE_MUSIC__"
                  alt=""
                  width="10"
                  height="10"
                />
                YouTube Music
              </button>
              <button
                class="chip"
                type="button"
                data-filter="soundcloud"
                title="SoundCloud"
              >
                <img
                  class="brand-icon"
                  src="__LOGO_SOUNDCLOUD__"
                  alt=""
                  width="10"
                  height="10"
                />
                SoundCloud
              </button>
            </div>
          </div>
        </div>
        <div class="results">
          <div class="results-bar" id="resultsBar" hidden>
            <span class="results-bar-label">Results</span>
            <button class="results-clear" type="button" id="resultsClear">
              Clear
            </button>
          </div>
          <div class="list" id="list" role="listbox"></div>
        </div>
      </div>
      <div class="preview" id="preview" hidden>
          <audio id="previewAudio" preload="metadata"></audio>
          <div class="provider-host" id="providerHost" hidden></div>
          <div class="preview-header">
            <div class="preview-leading">
              <span class="preview-badge" id="previewBadge" aria-hidden="true"></span>
              <div class="preview-copy">
                <span class="preview-title" id="previewTitle"></span>
                <span class="preview-status" id="previewStatus"></span>
              </div>
            </div>
            <div class="preview-transport">
              <button
                class="transport skip-back"
                type="button"
                id="previewRewind"
                aria-label="Skip back 5 seconds"
                title="Skip back 5 seconds"
                disabled
              ></button>
              <button
                class="transport"
                type="button"
                id="previewToggle"
                aria-label="Play preview"
                title="Play preview"
                disabled
              ></button>
              <button
                class="transport skip-forward"
                type="button"
                id="previewForward"
                aria-label="Skip forward 5 seconds"
                title="Skip forward 5 seconds"
                disabled
              ></button>
            </div>
            <div class="preview-actions">
              <span class="preview-clock" id="previewClock"
                >0:00.0 / 0:00.0</span
              >
            </div>
          </div>
          <div
            class="timeline"
            id="timeline"
            aria-label="Preview and selected range"
          >
            <div class="timeline-track"></div>
            <div class="timeline-selection" id="timelineSelection"></div>
            <div class="playhead" id="playhead"></div>
            <button
              class="timeline-handle"
              id="startHandle"
              type="button"
              aria-label="Selection start"
              disabled
            >
              <!-- Right-pointing triangle (▶) at selection start -->
              <svg
                class="handle-shape"
                viewBox="0 0 8.660254 10"
                aria-hidden="true"
                focusable="false"
              >
                <path
                  class="handle-solid"
                  d="M 0 0 L 8.660254 5 L 0 10 Z"
                ></path>
                <path
                  class="handle-outline"
                  d="M 0.5 0.866 L 7.794228 5 L 0.5 9.134 Z"
                ></path>
              </svg>
            </button>
            <button
              class="timeline-handle"
              id="endHandle"
              type="button"
              aria-label="Selection end"
              disabled
            >
              <!-- Left-pointing triangle (◀) at selection end -->
              <svg
                class="handle-shape"
                viewBox="0 0 8.660254 10"
                aria-hidden="true"
                focusable="false"
              >
                <path
                  class="handle-solid"
                  d="M 8.660254 0 L 0 5 L 8.660254 10 Z"
                ></path>
                <path
                  class="handle-outline"
                  d="M 8.160254 0.866 L 0.866026 5 L 8.160254 9.134 Z"
                ></path>
              </svg>
            </button>
          </div>
          <div class="clip-params" id="clipParams">
            <div class="clip-param">
              <div class="clip-param-head">
                <span class="clip-param-label">Start</span>
                <button
                  class="button"
                  type="button"
                  data-set="start"
                  disabled
                >
                  <span class="clip-set-label">Set</span>
                </button>
              </div>
              <div id="rangeStartHost"></div>
            </div>
            <div class="clip-param clip-param-length">
              <div class="clip-param-head">
                <span class="clip-param-label">Length</span>
              </div>
              <div id="rangeLengthHost"></div>
            </div>
            <div class="clip-param clip-param-end">
              <div class="clip-param-head">
                <span class="clip-param-label">End</span>
                <button class="button" type="button" data-set="end" disabled>
                  <span class="clip-set-label">Set</span>
                </button>
              </div>
              <div id="rangeEndHost"></div>
            </div>
          </div>
        </div>
    </div>
    <div class="footer">
      <button
        class="button"
        type="button"
        onclick="closeWithResult({ candidate: null })"
      >
        Cancel
      </button>
      <button
        class="button"
        id="importButton"
        type="button"
        onclick="confirmPick()"
      >
        Import
      </button>
    </div>
