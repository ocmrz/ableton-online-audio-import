<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Import Online Audio</title>
    <script>
      document.title = "Import Online Audio";

      function sendMessage(message) {
        if (
          window.webkit &&
          window.webkit.messageHandlers &&
          window.webkit.messageHandlers.live
        ) {
          window.webkit.messageHandlers.live.postMessage(message);
        } else if (window.chrome && window.chrome.webview) {
          window.chrome.webview.postMessage(message);
        }
      }
      function closeWithResult(result) {
        sendMessage({
          method: "close_and_send",
          params: [JSON.stringify(result)],
        });
      }

      var DEBOUNCE_MS = 320;
      var filters = {
        youtube: false,
        "youtube-music": false,
        soundcloud: false,
      };
      var selected = 0;
      var visible = [];
      var ranked = [];
      var debounceTimer = null;
      var searchGen = 0;
      var searching = false;
      var searchError = "";
      var previewGen = 0;
      var previewAbort = null;
      var previewItemKey = "";
      var previewDuration = 0;
      var previewStart = 0;
      var previewEnd = 0;
      var previewLoading = false;
      var previewReady = false;
      var previewError = "";
      var draggingTimeline = null;
      var dragFrame = null;
      var dragPendingTime = null;
      var dragTimelineRect = null;
      var dragPreviewTime = null;
      var dragInitialEnd = 0;
      var dragWasStoppedAtEnd = false;
      var previewProvider = "";
      var providerCurrentTime = 0;
      var providerPaused = true;
      var stoppedAtRangeEnd = false;
      var lastStoppedPreviewTime = 0;
      var youtubePlayer = null;
      var youtubePlayerReady = false;
      var youtubeReadyHandler = null;
      var youtubeStateHandler = null;
      var youtubeErrorHandler = null;
      var youtubePoll = null;
      var youtubeApiPromise = null;
      var youtubeRetryTimer = null;
      var youtubeLoadTimer = null;
      var soundcloudWidget = null;
      var soundcloudWidgetReady = false;
      var soundcloudApiPromise = null;
      var soundcloudRetryTimer = null;
      var soundcloudLoadTimer = null;
      var soundcloudTrackUrl = "";
      var MIN_SELECTION_S = 0.25;

      var LOGOS = {
        youtube: "__LOGO_YOUTUBE__",
        "youtube-music": "__LOGO_YOUTUBE_MUSIC__",
        soundcloud: "__LOGO_SOUNDCLOUD__",
      };

      function brandIcon(brand) {
        var src = LOGOS[brand] || LOGOS.youtube;
        return (
          '<img class="brand-icon" src="' +
          src +
          '" alt="" width="16" height="16" />'
        );
      }

      function fmtDuration(s) {
        if (s == null) return "?:??";
        var whole = Math.max(0, Math.round(s));
        var m = Math.floor(whole / 60);
        var r = whole % 60;
        return m + ":" + String(r).padStart(2, "0");
      }

      function fmtPrecise(s) {
        var safe = Number.isFinite(s) ? Math.max(0, s) : 0;
        var m = Math.floor(safe / 60);
        var r = (safe - m * 60).toFixed(1);
        return m + ":" + String(r).padStart(4, "0");
      }

      function currentItem() {
        return visible[selected] || null;
      }

      function candidateKey(item) {
        if (!item) return "";
        var c = item.candidate;
        return c.source + ":" + c.id + ":" + c.url;
      }

      function stopPreview(opts) {
        opts = opts || {};
        var preserveYoutube = !!opts.preserveYoutube;
        var preserveSoundcloud = !!opts.preserveSoundcloud;
        if (previewAbort) previewAbort.abort();
        previewAbort = null;
        clearInterval(youtubePoll);
        youtubePoll = null;
        clearTimeout(youtubeRetryTimer);
        youtubeRetryTimer = null;
        clearTimeout(youtubeLoadTimer);
        youtubeLoadTimer = null;
        clearTimeout(soundcloudRetryTimer);
        soundcloudRetryTimer = null;
        clearTimeout(soundcloudLoadTimer);
        soundcloudLoadTimer = null;
        if (dragFrame != null) cancelAnimationFrame(dragFrame);
        dragFrame = null;
        dragPendingTime = null;
        dragTimelineRect = null;
        dragPreviewTime = null;
        draggingTimeline = null;
        document
          .getElementById("timeline")
          ?.classList.remove("playhead-active");
        youtubeReadyHandler = null;
        youtubeStateHandler = null;
        youtubeErrorHandler = null;
        if (youtubePlayer && typeof youtubePlayer.destroy === "function") {
          if (preserveYoutube) {
            try {
              youtubePlayer.pauseVideo();
            } catch (_) {}
          } else {
            try {
              youtubePlayer.destroy();
            } catch (_) {}
            youtubePlayer = null;
            youtubePlayerReady = false;
          }
        }
        if (soundcloudWidget) {
          try {
            soundcloudWidget.pause();
          } catch (_) {}
          if (!preserveSoundcloud) {
            soundcloudWidget = null;
            soundcloudWidgetReady = false;
            soundcloudTrackUrl = "";
          }
        }
        previewProvider = "";
        providerCurrentTime = 0;
        providerPaused = true;
        stoppedAtRangeEnd = false;
        lastStoppedPreviewTime = 0;
        var providerHost = document.getElementById("providerHost");
        if (providerHost && !preserveYoutube && !preserveSoundcloud) {
          providerHost.innerHTML = "";
          providerHost.hidden = true;
        }
        var audio = document.getElementById("previewAudio");
        if (audio) {
          audio.pause();
          audio.removeAttribute("src");
          audio.load();
        }
      }

      function resetPreview(item) {
        var preserveYoutube =
          !!item &&
          item.candidate.source === "youtube" &&
          /^[a-zA-Z0-9_-]{11}$/.test(item.candidate.id);
        var preserveSoundcloud =
          !!item && item.candidate.source === "soundcloud";
        stopPreview({
          preserveYoutube: preserveYoutube,
          preserveSoundcloud: preserveSoundcloud,
        });
        previewGen += 1;
        previewItemKey = candidateKey(item);
        previewDuration =
          item && Number.isFinite(item.candidate.durationS)
            ? Math.max(0, item.candidate.durationS)
            : 0;
        previewStart = 0;
        previewEnd = previewDuration;
        lastStoppedPreviewTime = previewStart;
        previewLoading = false;
        previewReady = false;
        previewError = "";
        updatePreviewUi();
        if (item) {
          loadPreview(item, previewGen);
        }
      }

      function previewErrorMessage(err) {
        return String(err && err.message ? err.message : err)
          .split("\n")[0]
          .slice(0, 150);
      }

      function focusPreviewTransport() {
        var active = document.activeElement;
        var search = document.getElementById("q");
        if (active !== search && active !== document.body) return;
        var toggle = document.getElementById("previewToggle");
        try {
          toggle.focus({ preventScroll: true });
        } catch (_) {
          toggle.focus();
        }
      }

      function applyPreviewDuration(duration) {
        if (!Number.isFinite(duration) || duration <= 0) return;
        var wasTrimmed = selectionIsTrimmed();
        previewDuration = duration;
        previewStart = Math.min(previewStart, previewDuration);
        previewEnd = wasTrimmed
          ? Math.min(previewEnd, previewDuration)
          : previewDuration;
      }

      function ensureYoutubeApi() {
        if (window.YT && typeof window.YT.Player === "function") {
          return Promise.resolve(window.YT);
        }
        if (youtubeApiPromise) return youtubeApiPromise;
        youtubeApiPromise = new Promise(function (resolve, reject) {
          var settled = false;
          var previous = window.onYouTubeIframeAPIReady;
          var timeout = setTimeout(function () {
            if (settled) return;
            settled = true;
            youtubeApiPromise = null;
            reject(new Error("YouTube preview timed out"));
          }, 8_000);
          window.onYouTubeIframeAPIReady = function () {
            if (typeof previous === "function") previous();
            if (settled) return;
            settled = true;
            clearTimeout(timeout);
            resolve(window.YT);
          };
          var script = document.createElement("script");
          script.src = "https://www.youtube.com/iframe_api";
          script.onerror = function () {
            if (settled) return;
            settled = true;
            clearTimeout(timeout);
            youtubeApiPromise = null;
            reject(new Error("YouTube preview could not load"));
          };
          document.head.appendChild(script);
        });
        return youtubeApiPromise;
      }

      function createYoutubeIframe(host, item) {
        host.innerHTML = "";
        var iframe = document.createElement("iframe");
        iframe.id = "youtubeMount";
        iframe.width = "200";
        iframe.height = "200";
        iframe.tabIndex = -1;
        iframe.title = "YouTube preview";
        iframe.setAttribute("aria-hidden", "true");
        iframe.setAttribute(
          "sandbox",
          "allow-scripts allow-same-origin allow-presentation",
        );
        iframe.setAttribute("allow", "autoplay; encrypted-media");
        iframe.referrerPolicy = "strict-origin-when-cross-origin";
        var params = new URLSearchParams({
          enablejsapi: "1",
          autoplay: "1",
          controls: "0",
          disablekb: "1",
          playsinline: "1",
          rel: "0",
          origin: window.location.origin,
          widget_referrer: window.location.href,
        });
        iframe.src =
          "https://www.youtube.com/embed/" +
          encodeURIComponent(item.candidate.id) +
          "?" +
          params.toString();
        host.appendChild(iframe);
        return iframe;
      }

      function soundcloudWidgetOptions() {
        return {
          auto_play: true,
          hide_related: true,
          show_comments: false,
          show_user: false,
          show_reposts: false,
          show_teaser: false,
          visual: false,
          show_artwork: false,
          download: false,
          buying: false,
          sharing: false,
        };
      }

      function soundcloudEmbedSrc(item) {
        var params = new URLSearchParams(
          Object.assign(
            { url: item.candidate.url },
            soundcloudWidgetOptions(),
          ),
        );
        return "https://w.soundcloud.com/player/?" + params.toString();
      }

      function createSoundcloudIframe(host, item) {
        host.innerHTML = "";
        var iframe = document.createElement("iframe");
        iframe.id = "soundcloudMount";
        iframe.width = "200";
        iframe.height = "200";
        iframe.tabIndex = -1;
        iframe.title = "SoundCloud preview";
        iframe.setAttribute("aria-hidden", "true");
        iframe.setAttribute(
          "sandbox",
          "allow-scripts allow-same-origin allow-presentation allow-popups",
        );
        iframe.setAttribute("allow", "autoplay");
        iframe.referrerPolicy = "strict-origin-when-cross-origin";
        iframe.src = soundcloudEmbedSrc(item);
        host.appendChild(iframe);
        return iframe;
      }

      function ensureSoundcloudApi() {
        if (window.SC && typeof window.SC.Widget === "function") {
          return Promise.resolve(window.SC);
        }
        if (soundcloudApiPromise) return soundcloudApiPromise;
        soundcloudApiPromise = new Promise(function (resolve, reject) {
          var settled = false;
          var timeout = setTimeout(function () {
            if (settled) return;
            settled = true;
            soundcloudApiPromise = null;
            reject(new Error("SoundCloud preview timed out"));
          }, 8_000);
          var script = document.createElement("script");
          script.src = "https://w.soundcloud.com/player/api.js";
          script.onload = function () {
            if (settled) return;
            if (window.SC && typeof window.SC.Widget === "function") {
              settled = true;
              clearTimeout(timeout);
              resolve(window.SC);
              return;
            }
            settled = true;
            clearTimeout(timeout);
            soundcloudApiPromise = null;
            reject(new Error("SoundCloud preview could not load"));
          };
          script.onerror = function () {
            if (settled) return;
            settled = true;
            clearTimeout(timeout);
            soundcloudApiPromise = null;
            reject(new Error("SoundCloud preview could not load"));
          };
          document.head.appendChild(script);
        });
        return soundcloudApiPromise;
      }

      async function loadSoundcloudPreview(item, gen, attempt) {
        attempt = attempt || 0;
        clearTimeout(soundcloudRetryTimer);
        soundcloudRetryTimer = null;
        clearTimeout(soundcloudLoadTimer);
        soundcloudLoadTimer = null;
        clearInterval(youtubePoll);
        youtubePoll = null;
        previewProvider = "soundcloud";
        previewLoading = true;
        previewReady = false;
        previewError = "";
        providerPaused = true;
        soundcloudTrackUrl = item.candidate.url;
        var host = document.getElementById("providerHost");
        host.hidden = false;
        updatePreviewUi();

        var handledFailure = false;
        function retryOrFallback() {
          if (handledFailure || gen !== previewGen) return;
          handledFailure = true;
          clearTimeout(soundcloudLoadTimer);
          soundcloudLoadTimer = null;
          clearInterval(youtubePoll);
          youtubePoll = null;
          soundcloudWidget = null;
          soundcloudWidgetReady = false;
          soundcloudTrackUrl = "";
          host.innerHTML = "";
          host.hidden = true;
          previewReady = false;
          providerPaused = true;
          if (attempt < 1) {
            previewLoading = true;
            previewError = "";
            updatePreviewUi();
            soundcloudRetryTimer = setTimeout(function () {
              soundcloudRetryTimer = null;
              if (gen === previewGen) {
                void loadSoundcloudPreview(item, gen, attempt + 1);
              }
            }, 250);
          } else {
            void loadDirectPreview(item, gen);
          }
        }

        function startPolling() {
          clearInterval(youtubePoll);
          youtubePoll = setInterval(function () {
            if (
              !soundcloudWidget ||
              handledFailure ||
              gen !== previewGen ||
              draggingTimeline
            ) {
              return;
            }
            try {
              soundcloudWidget.getPosition(function (ms) {
                if (handledFailure || gen !== previewGen) return;
                providerCurrentTime = Math.max(0, (ms || 0) / 1000);
                if (providerCurrentTime < previewStart) {
                  soundcloudWidget.seekTo(previewStart * 1000);
                  providerCurrentTime = previewStart;
                } else if (
                  providerCurrentTime > previewEnd ||
                  (!providerPaused &&
                    providerCurrentTime >= previewEnd - 0.02)
                ) {
                  soundcloudWidget.pause();
                  soundcloudWidget.seekTo(previewEnd * 1000);
                  providerPaused = true;
                  providerCurrentTime = previewEnd;
                  stoppedAtRangeEnd = true;
                  lastStoppedPreviewTime = previewEnd;
                }
                updatePlaybackUi();
              });
              soundcloudWidget.getDuration(function (ms) {
                if (handledFailure || gen !== previewGen) return;
                applyPreviewDuration(Math.max(0, (ms || 0) / 1000));
                updatePreviewUi();
              });
            } catch (_) {}
          }, 100);
        }

        function activateWidget(widget, reload) {
          if (handledFailure || gen !== previewGen) return;
          clearTimeout(soundcloudLoadTimer);
          soundcloudLoadTimer = null;
          function afterReady() {
            if (handledFailure || gen !== previewGen) return;
            previewLoading = false;
            previewReady = true;
            previewError = "";
            providerPaused = false;
            stoppedAtRangeEnd = false;
            try {
              widget.seekTo(previewStart * 1000);
              widget.play();
            } catch (_) {
              retryOrFallback();
              return;
            }
            soundcloudLoadTimer = setTimeout(function () {
              soundcloudLoadTimer = null;
              if (gen !== previewGen || handledFailure) return;
              try {
                widget.isPaused(function (paused) {
                  if (gen !== previewGen || handledFailure) return;
                  if (paused) retryOrFallback();
                });
              } catch (_) {
                retryOrFallback();
              }
            }, 4_000);
            startPolling();
            updatePreviewUi();
            focusPreviewTransport();
          }
          if (reload) {
            try {
              widget.load(
                item.candidate.url,
                Object.assign({}, soundcloudWidgetOptions(), {
                  callback: afterReady,
                }),
              );
            } catch (_) {
              retryOrFallback();
            }
            return;
          }
          afterReady();
        }

        try {
          var SC = await ensureSoundcloudApi();
          if (gen !== previewGen) return;
          if (soundcloudWidget && soundcloudWidgetReady) {
            activateWidget(soundcloudWidget, true);
            return;
          }
          soundcloudWidget = null;
          soundcloudWidgetReady = false;
          var iframe = createSoundcloudIframe(host, item);
          soundcloudWidget = SC.Widget(iframe);
          soundcloudWidget.bind(SC.Widget.Events.READY, function () {
            soundcloudWidgetReady = true;
            if (handledFailure || gen !== previewGen) return;
            activateWidget(soundcloudWidget, false);
          });
          soundcloudWidget.bind(SC.Widget.Events.PLAY, function () {
            if (handledFailure || gen !== previewGen) return;
            clearTimeout(soundcloudLoadTimer);
            soundcloudLoadTimer = null;
            providerPaused = false;
            updatePlaybackUi();
          });
          soundcloudWidget.bind(SC.Widget.Events.PAUSE, function () {
            if (handledFailure || gen !== previewGen) return;
            providerPaused = true;
            updatePlaybackUi();
          });
          soundcloudWidget.bind(SC.Widget.Events.PLAY_PROGRESS, function (data) {
            if (handledFailure || gen !== previewGen || draggingTimeline) {
              return;
            }
            providerCurrentTime = Math.max(
              0,
              ((data && data.currentPosition) || 0) / 1000,
            );
            updatePlaybackUi();
          });
          soundcloudWidget.bind(SC.Widget.Events.ERROR, function () {
            if (handledFailure || gen !== previewGen) return;
            console.warn("[preview] SoundCloud widget error");
            retryOrFallback();
          });
          soundcloudLoadTimer = setTimeout(retryOrFallback, 8_000);
        } catch (_) {
          retryOrFallback();
        }
      }

      async function loadYoutubePreview(item, gen, attempt) {
        attempt = attempt || 0;
        clearTimeout(youtubeRetryTimer);
        youtubeRetryTimer = null;
        clearTimeout(youtubeLoadTimer);
        youtubeLoadTimer = null;
        previewProvider = "youtube";
        previewLoading = true;
        previewReady = false;
        previewError = "";
        providerPaused = true;
        var host = document.getElementById("providerHost");
        host.hidden = false;
        updatePreviewUi();

        var handledFailure = false;
        function isCurrentVideo() {
          if (!youtubePlayer) return false;
          try {
            var videoId = youtubePlayer.getVideoData()?.video_id;
            return !videoId || videoId === item.candidate.id;
          } catch (_) {
            return true;
          }
        }

        function retryOrFallback() {
          if (handledFailure || gen !== previewGen) return;
          handledFailure = true;
          clearTimeout(youtubeLoadTimer);
          youtubeLoadTimer = null;
          clearInterval(youtubePoll);
          youtubePoll = null;
          youtubeReadyHandler = null;
          youtubeStateHandler = null;
          youtubeErrorHandler = null;
          try {
            youtubePlayer?.destroy();
          } catch (_) {}
          youtubePlayer = null;
          youtubePlayerReady = false;
          host.innerHTML = "";
          host.hidden = true;
          previewReady = false;
          providerPaused = true;
          if (attempt < 1) {
            previewLoading = true;
            previewError = "";
            updatePreviewUi();
            youtubeRetryTimer = setTimeout(function () {
              youtubeRetryTimer = null;
              if (gen === previewGen) {
                void loadYoutubePreview(item, gen, attempt + 1);
              }
            }, 250);
          } else {
            void loadDirectPreview(item, gen);
          }
        }

        function startPolling() {
          clearInterval(youtubePoll);
          youtubePoll = setInterval(function () {
            if (
              !youtubePlayer ||
              handledFailure ||
              gen !== previewGen ||
              !isCurrentVideo() ||
              draggingTimeline
            ) {
              return;
            }
            try {
              providerCurrentTime = youtubePlayer.getCurrentTime() || 0;
              applyPreviewDuration(youtubePlayer.getDuration());
              if (providerCurrentTime < previewStart) {
                youtubePlayer.seekTo(previewStart, true);
                providerCurrentTime = previewStart;
              } else if (
                providerCurrentTime > previewEnd ||
                (!providerPaused &&
                  providerCurrentTime >= previewEnd - 0.02)
              ) {
                youtubePlayer.pauseVideo();
                youtubePlayer.seekTo(previewEnd, true);
                providerPaused = true;
                providerCurrentTime = previewEnd;
                stoppedAtRangeEnd = true;
                lastStoppedPreviewTime = previewEnd;
              }
              updatePlaybackUi();
            } catch (_) {}
          }, 100);
        }

        function activatePlayer(target, switchVideo) {
          if (handledFailure || gen !== previewGen) return;
          clearTimeout(youtubeLoadTimer);
          youtubeLoadTimer = null;
          previewLoading = true;
          previewReady = true;
          previewError = "";
          providerPaused = true;
          stoppedAtRangeEnd = false;
          updatePreviewUi();
          if (switchVideo) {
            target.loadVideoById({
              videoId: item.candidate.id,
              startSeconds: previewStart,
              suggestedQuality: "small",
            });
          }
          if (typeof target.setPlaybackQuality === "function") {
            target.setPlaybackQuality("small");
          }
          target.playVideo();
          youtubeLoadTimer = setTimeout(function () {
            youtubeLoadTimer = null;
            if (gen !== previewGen || handledFailure) return;
            var state = youtubePlayer?.getPlayerState();
            if (
              !isCurrentVideo() ||
              (state !== YT.PlayerState.PLAYING &&
                state !== YT.PlayerState.BUFFERING)
            ) {
              retryOrFallback();
            }
          }, 4_000);
          startPolling();
          focusPreviewTransport();
        }

        var YT;
        try {
          YT = await ensureYoutubeApi();
          if (gen !== previewGen) return;
          youtubeReadyHandler = function (event) {
            activatePlayer(event.target, true);
          };
          youtubeStateHandler = function (event) {
            if (handledFailure || gen !== previewGen) return;
            // During loadVideoById the reported id can lag; still accept
            // play/pause while this preview generation is loading.
            if (!isCurrentVideo() && !previewLoading) return;
            if (event.data === YT.PlayerState.PLAYING) {
              clearTimeout(youtubeLoadTimer);
              youtubeLoadTimer = null;
              previewLoading = false;
              previewReady = true;
              previewError = "";
              providerPaused = false;
            } else if (
              event.data === YT.PlayerState.PAUSED ||
              event.data === YT.PlayerState.ENDED ||
              event.data === YT.PlayerState.CUED
            ) {
              previewLoading = false;
              providerPaused = true;
            } else if (event.data === YT.PlayerState.BUFFERING) {
              providerPaused = false;
            }
            updatePlaybackUi();
          };
          youtubeErrorHandler = function (event) {
            if (!isCurrentVideo()) return;
            console.warn("[preview] YouTube iframe error", event.data);
            retryOrFallback();
          };

          if (youtubePlayer && youtubePlayerReady) {
            activatePlayer(youtubePlayer, true);
            return;
          }
          if (youtubePlayer) {
            youtubeLoadTimer = setTimeout(retryOrFallback, 6_000);
            return;
          }

          var iframe = createYoutubeIframe(host, item);
          youtubePlayer = new YT.Player(iframe, {
            events: {
              onReady: function (event) {
                youtubePlayerReady = true;
                youtubeReadyHandler?.(event);
              },
              onStateChange: function (event) {
                youtubeStateHandler?.(event);
              },
              onError: function (event) {
                youtubeErrorHandler?.(event);
              },
            },
          });
          youtubeLoadTimer = setTimeout(retryOrFallback, 6_000);
        } catch (_) {
          retryOrFallback();
        }
      }

      async function loadDirectPreview(item, gen) {
        var ctrl = new AbortController();
        previewAbort = ctrl;
        previewProvider = "audio";
        previewLoading = true;
        previewReady = false;
        previewError = "";
        updatePreviewUi();
        try {
          var res = await fetch("/preview", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ candidate: item.candidate }),
            signal: ctrl.signal,
          });
          if (gen !== previewGen) return;
          if (!res.ok) {
            var body = null;
            try {
              body = await res.json();
            } catch (_) {}
            throw new Error(
              body && body.error
                ? String(body.error).split("\n")[0]
                : "Preview HTTP " + res.status,
            );
          }
          var data = await res.json();
          if (gen !== previewGen) return;
          applyPreviewDuration(data.durationS);
          var audio = document.getElementById("previewAudio");
          audio.src = data.mediaUrl;
          audio.addEventListener(
            "canplay",
            function () {
              if (gen === previewGen && previewReady) {
                playPreviewAt(previewStart);
              }
            },
            { once: true },
          );
          audio.load();
          updatePreviewUi();
        } catch (err) {
          if (gen !== previewGen || ctrl.signal.aborted) return;
          previewLoading = false;
          previewReady = false;
          previewError = previewErrorMessage(err);
          updatePreviewUi();
        } finally {
          if (previewAbort === ctrl) previewAbort = null;
        }
      }

      function loadPreview(item, gen) {
        if (
          item.candidate.source === "youtube" &&
          /^[a-zA-Z0-9_-]{11}$/.test(item.candidate.id)
        ) {
          void loadYoutubePreview(item, gen, 0);
          return;
        }
        if (item.candidate.source === "soundcloud") {
          void loadSoundcloudPreview(item, gen, 0);
          return;
        }
        void loadDirectPreview(item, gen);
      }

      function selectionIsTrimmed() {
        return (
          previewDuration > 0 &&
          (previewStart > 0.05 || previewEnd < previewDuration - 0.25)
        );
      }

      function updatePreviewUi() {
        var panel = document.getElementById("preview");
        if (!panel) return;
        var item = currentItem();
        panel.hidden = !item;
        if (!item) return;

        document.getElementById("previewTitle").textContent =
          item.candidate.title;
        var status =
          item.subtitle ||
          item.candidate.artists.join(", ") ||
          item.candidate.channel ||
          item.candidate.source;
        if (previewError) status = previewError;

      function clearResults() {

        ranked = [];
        searchError = "";
        selected = 0;

      function confirmPick() {

        var candidate = Object.assign({}, item.candidate);

        selected = 0;
        render();

            audio.pause();
            audio.currentTime = previewEnd;
            stoppedAtRangeEnd = true;
            lastStoppedPreviewTime = previewEnd;

          if (previewProvider !== "audio") return;

            e.target !== q

        gap: 4px;
        padding: 2px 6px 4px;
        border: 0;
        flex: 0 0 auto;
        background: var(--p-live-surface-bg);
      }
      .chips {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .chip {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 3px;
        background: var(--p-live-chip-bg);
        color: var(--p-live-surface-text);
        border: 1px solid transparent;
        height: 14px;
        padding: 0 6px 0 4px;
        border-radius: 0;
        font-size: 10px;
        line-height: 12px;
        cursor: default;
        box-sizing: border-box;
        outline: none;
      }
      .chip .brand-icon {
        width: 10px;
        height: 10px;
        object-fit: contain;
        display: block;
        flex: 0 0 auto;
      }
      @media (prefers-color-scheme: dark) {
        .chip .brand-icon,
        .badge .brand-icon,
        .preview-badge .brand-icon {
          /* Dark assets → ~#B5B5B5 (not pure white) */
          filter: invert(1) brightness(0.71);
        }
      }
      .chip:hover {
        background: var(--p-live-chip-bg);
        color: var(--p-live-surface-text);
      }
      .chip:focus,
      .chip:focus-visible {
        border-color: var(--p-live-surface-text);
      }
      .chip.active {
        background: var(--p-live-chip-active-bg);
        color: #121212;
      }
      .chip.active:hover {
        background: var(--p-live-chip-active-bg);
      }
      .chip.active .brand-icon {
        filter: none;
      }
      .results {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .results-bar {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        height: 19px;
        padding: 0 6px;
        background: var(--p-live-results-bar-bg);
        color: var(--p-live-results-bar-fg);
        font-weight: 400;
      }
      .results-bar-label {
        font-size: 10px;
        line-height: 1;
        display: flex;
        align-items: center;
      }
      .results-bar[hidden] {
        display: none;
      }
      .results-clear {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
        height: 14px;
        padding: 0 6px;
        border: 1px solid #4f4f4f;
        border-radius: 7px;
        background: #cfcfcf;
        color: #121212;
        font: inherit;
        font-size: 10px;
        line-height: 12px;
        cursor: default;
      }
      .results-clear:active {
        background: var(--p-live-accent-primary);
      }
      @media (prefers-color-scheme: dark) {
        .results-clear {
          background: var(--p-live-control-bg);
          color: var(--p-live-control-text--enabled);
          border-color: var(--p-live-control-border);
        }
        .results-clear:active {
          background: var(--p-live-accent-primary);
          color: #121212;
        }
      }
      .list {
        flex: 1;
        overflow: auto;
        min-height: 0;
        background: var(--p-live-surface-bg);
        color: var(--p-live-surface-text);
        overscroll-behavior: none;
      }
      .row {
        display: grid;
        grid-template-columns: 22px 1fr auto;
        gap: 0.5em;
        align-items: center;
        width: 100%;
        text-align: left;
        padding: 5px 8px 5px 5px;
        border: 0;
        border-bottom: 0;
        background: transparent;
        color: var(--p-live-surface-text);
        cursor: default;
      }
      .row:hover:not(.selected) {
        background: transparent;
      }
      .row.selected {
        background: var(--p-live-selection-bg);
        outline: none;
      }
      .row.selected .title,
      .row.selected .sub,
      .row.selected .dur,
      .row .title,
      .row .sub,
      .row .dur {
        color: var(--p-live-surface-text);
      }
      .badge {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .badge .brand-icon {
        width: 16px;
        height: 16px;
        object-fit: contain;
        display: block;
      }
      .meta {
        display: flex;
        flex-direction: column;
        gap: 0.1em;
        min-width: 0;
      }
      .title {
        color: var(--p-live-surface-text);
        font-size: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sub,
      .dur {
        color: var(--p-live-surface-text);
        font-size: 9px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .dur {
        font-variant-numeric: tabular-nums;
      }
      @media (prefers-color-scheme: dark) {
        .list,
        .row,
        .row .title,
        .row .sub,
        .row .dur {
          color: #b5b5b5;
        }
        .row.selected,
        .row.selected .title,
        .row.selected .sub,
        .row.selected .dur {
          color: #121212;
        }
        .row.selected .badge .brand-icon {
          /* Source icons are dark; undo dark-mode invert → ~#070707 */
          filter: none;
        }
      }
      .empty {
        padding: 2em 1.4em 1.4em;
        color: var(--p-live-empty-text);
        text-align: center;
        font-size: 10px;
      }
      .preview[hidden] {
        display: none;
      }
      .preview {
        flex: 0 0 auto;
        padding: 6px 8px 7px;
        border: 0;
        border-radius: 4px;
        overflow: hidden;
        background: var(--p-live-surface-bg);
        color: var(--p-live-surface-text);
      }
      .provider-host[hidden] {
        display: none;
      }
      .provider-host {
        position: fixed;
        top: 0;
        left: -10000px;
        width: 200px;
        height: 200px;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
      }
      .provider-host iframe {
        display: block;
        width: 200px;
        height: 200px;
        border: 0;
      }
      .preview-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        align-items: center;
        gap: 7px;
      }
      .preview-leading {
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr);
        align-items: center;
        gap: 0.5em;
        min-width: 0;
      }
      .preview-badge {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 20px;
      }
      .preview-badge .brand-icon {
        width: 16px;
        height: 16px;
        object-fit: contain;
        display: block;
      }
      .preview-copy {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .preview-title,
      .preview-status {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .preview-title {
        font-size: 10px;
      }
      .preview-status {
        color: var(--p-live-surface-text);
        font-size: 9px;
      }
      .preview-transport {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
      }
      .transport {
        -webkit-appearance: none;
        appearance: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
        width: 20px;
        height: 20px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--p-live-surface-text);
        cursor: default;
      }
      #previewToggle::before {
        content: "";
        width: 0;
        height: 0;
        margin-left: 2px;
        border-top: 6px solid transparent;
        border-bottom: 6px solid transparent;
        border-left: 10px solid currentColor;
      }
      #previewToggle.playing::before {
        width: 10px;
        height: 10px;
        margin-left: 0;
        border: 0;
        background: currentColor;
      }
      #previewToggle.loading::before {
        width: 10px;
        height: 10px;
        margin-left: 0;
        border: 1.5px solid currentColor;
        border-right-color: transparent;
        border-radius: 50%;
        background: transparent;
        animation: transport-spin 0.8s linear infinite;
      }
      @keyframes transport-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .transport.skip-back::before,
      .transport.skip-back::after,
      .transport.skip-forward::before,
      .transport.skip-forward::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 0;
        height: 0;
        margin-top: -5px;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
      }
      .transport.skip-back::before,
      .transport.skip-back::after {
        border-right: 7px solid currentColor;
      }
      .transport.skip-forward::before,
      .transport.skip-forward::after {
        border-left: 7px solid currentColor;
      }
      .transport.skip-back::before {
        left: 2px;
      }
      .transport.skip-back::after {
        left: 8px;
      }
      .transport.skip-forward::before {
        left: 3px;
      }
      .transport.skip-forward::after {
        left: 9px;
      }
      .transport:active {
        background: transparent;
        color: var(--p-live-accent-primary);
      }
      .transport:focus {
        outline: none;
        box-shadow: none;
      }
      .transport:disabled,
      .timeline-handle:disabled {
        opacity: 0.45;
      }
      .preview-clock {
        min-width: 78px;
        text-align: right;
        font-size: 9px;
        font-variant-numeric: tabular-nums;
      }
      .preview-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 7px;
        min-width: 0;
      }
      .timeline {
        --play-bar-height: 10px;
        position: relative;
        height: 30px;
        margin: 1px 0 1px;
        touch-action: none;
        user-select: none;
        cursor: default;
      }
      .timeline-track,
      .timeline-selection {
        position: absolute;
        top: 50%;
        height: var(--play-bar-height);
        transform: translateY(-50%);
      }
      .timeline-track {
        left: 0;
        right: 0;
        background: #9c9c9c;
        opacity: 1;
      }
      .timeline-selection {
        background: #9c9c9c;
        opacity: 1;
        box-shadow: inset 0 0 0 1px #3a3a3a;
      }
      @media (prefers-color-scheme: dark) {
        .timeline-track {
          background: #3e3e3e;
        }
        .timeline-selection {
          background: #363636;
          box-shadow: inset 0 0 0 1px #787878;
        }
      }
      .timeline-handle {
        -webkit-appearance: none;
        appearance: none;
        position: absolute;
        z-index: 3;
        top: 0;
        width: 20px;
        height: 100%;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        cursor: ew-resize;
        outline: none;
      }
      .triangle-shape {
        position: absolute;
        top: 50%;
        width: calc(var(--play-bar-height) * 0.8660254);
        height: var(--play-bar-height);
        transform: translateY(-50%);
        color: #3a3a3a;
        display: block;
        overflow: visible;
        pointer-events: none;
      }
      .triangle-shape path {
        fill: none;
        stroke: currentColor;
        stroke-width: 1;
        stroke-linejoin: miter;
        stroke-miterlimit: 3;
        vector-effect: non-scaling-stroke;
      }
      .timeline-handle:focus .triangle-shape path {
        fill: #cdf8ff;
      }
      @media (prefers-color-scheme: dark) {
        .triangle-shape {
          color: #787878;
        }
        .timeline-handle:focus .triangle-shape path {
          fill: #b0ddeb;
        }
      }
      #startHandle {
        transform: none;
        transform-origin: left center;
      }
      #startHandle .triangle-shape {
        left: 0;
        transform: translateY(-50%);
        transform-origin: left center;
      }
      #endHandle {
        /* Width matches the triangle so -100% anchors the right edge. */
        width: calc(var(--play-bar-height) * 0.8660254);
        transform: translateX(-100%);
        transform-origin: right center;
      }
      #endHandle::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        width: 20px;
      }
      #endHandle .triangle-shape {
        left: 0;
        right: auto;
        width: 100%;
        transform: translateY(-50%) scaleX(-1);
        transform-origin: center center;
      }
      .playhead {
        position: absolute;
        z-index: 4;
        top: 5px;
        bottom: 5px;
        width: 1px;
        background: var(--p-live-surface-text);
        pointer-events: none;
      }
      .timeline.playhead-active .playhead {
        background: #0ef;
      }
      @media (prefers-color-scheme: dark) {
        .timeline.playhead-active .playhead {
          background: #03c3d5;
        }
      }
      .range-row {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 6px;
        min-width: 0;
        margin: 0;
        font-size: 9px;
      }
      .range-time {
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .range-time:last-child {
        text-align: right;
      }
      .range-length {
        min-width: 0;
        color: var(--p-live-surface-muted);
        text-align: center;
      }
      .footer {
        display: flex;
        gap: 4px;
        justify-content: flex-end;
        align-items: center;
        padding: 4px 6px;
        background: var(--p-live-chrome-bg);
        border-top: 0;
      }
      .button {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
        background: var(--p-live-control-bg);
        color: var(--p-live-control-text--enabled);
        border: 1px solid var(--p-live-control-border);
        height: 14px;
        padding: 0 20px;
        border-radius: 7px;
        font-size: 9px;
        line-height: 12px;
        cursor: default;
        box-sizing: border-box;
      }
      .button:hover {
        background: var(--p-live-control-bg);
        color: var(--p-live-control-text--enabled);
      }
      .button:active {
        background: var(--p-live-accent-primary);
        color: #121212;
      }
    </style>
  </head>
  <body>
    <div class="chrome">
      <div class="panel">
        <div class="search-row">
          <input
            class="search"
            id="q"
            type="search"
            spellcheck="false"
            autocomplete="off"
            placeholder="Search or paste a URL"
            aria-label="Search"
          />
        </div>
        <div class="sources" id="sources">
          <button
            class="sources-header"
            type="button"
            id="sourcesToggle"
            aria-expanded="true"
            aria-controls="sourcesBody"
          >
            <span>Sources</span>
            <span class="sources-arrow" aria-hidden="true"></span>
          </button>
          <div class="toolbar" id="sourcesBody">
            <div class="chips">
              <button
                class="chip"
                type="button"
                data-filter="youtube"
                title="YouTube"
              >
                <img
                  class="brand-icon"
                  src="__LOGO_YOUTUBE__"
                  alt=""
                  width="10"
                  height="10"
                />
                YouTube
              </button>
              <button
                class="chip"
                type="button"
                data-filter="youtube-music"
                title="YouTube Music"
              >
                <img
                  class="brand-icon"
                  src="__LOGO_YOUTUBE_MUSIC__"
                  alt=""
                  width="10"
                  height="10"
                />
                YouTube Music
              </button>
              <button
                class="chip"
                type="button"
                data-filter="soundcloud"
                title="SoundCloud"
              >
                <img
                  class="brand-icon"
                  src="__LOGO_SOUNDCLOUD__"
                  alt=""
                  width="10"
                  height="10"
                />
                SoundCloud
              </button>
            </div>
          </div>
        </div>
        <div class="results">
          <div class="results-bar" id="resultsBar" hidden>
            <span class="results-bar-label">Results</span>
            <button class="results-clear" type="button" id="resultsClear">
              Clear
            </button>
          </div>
          <div class="list" id="list" role="listbox"></div>
        </div>
      </div>
      <div class="preview" id="preview" hidden>
          <audio id="previewAudio" preload="metadata"></audio>
          <div class="provider-host" id="providerHost" hidden></div>
          <div class="preview-header">
            <div class="preview-leading">
              <span class="preview-badge" id="previewBadge" aria-hidden="true"></span>
              <div class="preview-copy">
                <span class="preview-title" id="previewTitle"></span>
                <span class="preview-status" id="previewStatus"></span>
              </div>
            </div>
            <div class="preview-transport">
              <button
                class="transport skip-back"
                type="button"
                id="previewRewind"
                aria-label="Skip back 5 seconds"
                title="Skip back 5 seconds"
                disabled
              ></button>
              <button
                class="transport"
                type="button"
                id="previewToggle"
                aria-label="Play preview"
                title="Play preview"
                disabled
              ></button>
              <button
                class="transport skip-forward"
                type="button"
                id="previewForward"
                aria-label="Skip forward 5 seconds"
                title="Skip forward 5 seconds"
                disabled
              ></button>
            </div>
            <div class="preview-actions">
              <span class="preview-clock" id="previewClock"
                >0:00.0 / 0:00.0</span
              >
            </div>
          </div>
          <div
            class="timeline"
            id="timeline"
            aria-label="Preview and selected range"
          >
            <div class="timeline-track"></div>
            <div class="timeline-selection" id="timelineSelection"></div>
            <div class="playhead" id="playhead"></div>
            <button
              class="timeline-handle"
              id="startHandle"
              type="button"
              aria-label="Selection start"
              disabled
            >
              <svg
                class="triangle-shape"
                viewBox="0 0 10.392 12"
                aria-hidden="true"
                focusable="false"
              >
                <path d="M 0.5 0.866 L 9.392 6 L 0.5 11.134 Z"></path>
              </svg>
            </button>
            <button
              class="timeline-handle"
              id="endHandle"
              type="button"
              aria-label="Selection end"
              disabled
            >
              <svg
                class="triangle-shape"
                viewBox="0 0 10.392 12"
                aria-hidden="true"
                focusable="false"
              >
                <path d="M 0.5 0.866 L 9.392 6 L 0.5 11.134 Z"></path>
              </svg>
            </button>
          </div>
          <div class="range-row">
            <span class="range-time">Start <span id="rangeStart">0:00.0</span></span>
            <span class="range-length" id="rangeLength"></span>
            <span class="range-time">End <span id="rangeEnd">0:00.0</span></span>
          </div>
        </div>
    </div>
    <div class="footer">
      <button
        class="button"
        type="button"
        onclick="closeWithResult({ candidate: null })"
      >
        Cancel
      </button>
      <button
        class="button"
        id="importButton"
        type="button"
        onclick="confirmPick()"
      >
        Import
      </button>
    </div>
  </body>
</html>
